<!DOCTYPE html>
<html>
<head>
<title>O level - CBT Exam</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

.login-container{
height:100vh; display:flex; justify-content:center; align-items:center;
background:linear-gradient(135deg,#007bff,#00c6ff);
}
.login-box{
background:white; padding:40px; border-radius:15px; width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;
}

.header {
background:#1a73e8;color:white;padding:15px;
display:flex;justify-content:space-between;align-items:center;
}

.container { display:flex; height:85vh; }
.left { width:20%; background:#fff; padding:10px; overflow:auto; }
.right { width:80%; padding:20px; }

.option {
display:block;padding:12px;margin:8px 0;background:#eee;border-radius:8px;cursor:pointer;
}

.btn{
padding:10px 18px;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;margin:5px;
}
.blue{ background:#007bff; }
.green{ background:#28a745; }
.yellow{ background:#ffc107; color:black; }
.red{ background:#dc3545; }

.palette-btn {width:40px;height:40px;margin:5px;border:none;border-radius:6px;}

.result-card{background:white;padding:25px;border-radius:15px;max-width:1200px;margin:20px auto;}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;}
.score-box{background:#f8f9fc;padding:15px;border-radius:10px;text-align:center;}

/* ✅ PERFECT CHART ALIGNMENT */
.chart-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.chart-box{
height:320px;
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}
.chart-box:hover{
transform:scale(1.02);
}

.review-box{padding:12px;margin:10px 0;border-radius:8px;}
.correct-bg{ background:#d4edda; }
.wrong-bg{ background:#f8d7da; }
.unattempted-bg{ background:#fff3cd; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
<div class="login-box">
<h2>O Level - CBT Login</h2>
<input id="user" placeholder="Enter Name"><br><br>
<input id="pass" placeholder="Enter Mobile"><br><br>
<button class="btn blue" onclick="loginUser()">Start Exam</button>
<p id="loginMsg"></p>
</div>
</div>

<!-- EXAM -->
<div id="exam" style="display:none;">
<div class="header">
<div>JavaScript Part 4 - CBT Examination Portal</div>
<div id="timer"></div>
</div>

<div class="container">
<div class="left"><div id="palette"></div></div>

<div class="right">
<h4 id="counter"></h4>
<h3 id="question"></h3>
<div id="options"></div>

<div>
<button class="btn blue" onclick="prev()">Prev</button>
<button class="btn green" onclick="saveAndNext()">Next</button>
<button class="btn yellow" onclick="markReview()">Mark Review</button>
<button class="btn yellow" onclick="clearAnswer()">Clear</button>
<button class="btn red" onclick="confirmSubmit()">Submit</button>
</div>
</div>
</div>
</div>

<!-- RESULT -->
<div id="result" style="display:none;">
<div class="header">
<div>
📊 Result Dashboard<br>
<small id="studentInfo"></small>
</div>
<button class="btn green" onclick="downloadPDF()">Download PDF</button>
</div>

<div id="resultContent" class="result-card">

<div class="score-grid">
<div class="score-box">Total<br><b id="tTotal"></b></div>
<div class="score-box">Correct<br><b id="tCorrect"></b></div>
<div class="score-box">Wrong<br><b id="tWrong"></b></div>
<div class="score-box">Not Attempted<br><b id="tUnattempted"></b></div>
<div class="score-box">Score<br><b id="tScore"></b></div>
</div>

<!-- ✅ CHARTS TOGETHER -->
<div class="chart-container">
  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>
</div>

<h3>📝 Question Review</h3>
<div id="review"></div>

</div>
</div>

<script>

/* Basic CSS questions */
const questions = [
  {q:"What is ES6?", options:["ECMAScript 2015","ECMAScript 2016","ECMAScript 2017","ECMAScript 2018"], ans:0},
  {q:"What is template literal syntax?", options:["`Hello ${name}`","'Hello ' + name","'Hello {name}'","'Hello name'"], ans:0},
  {q:"What is destructuring assignment?", options:["Extract values from arrays/objects","Delete values","Copy values","Create values"], ans:0},
  {q:"What is array destructuring?", options:["let [a, b] = [1, 2];","let a, b = [1, 2];","let a = 1, b = 2;","[a, b] = [1, 2];"], ans:0},
  {q:"What is object destructuring?", options:["let {name, age} = person;","let name = person.name;","let name, age = person;","{name, age} = person;"], ans:0},
  {q:"What is the spread operator?", options:["[...array]","[array]","{...array}","{array}"], ans:0},
  {q:"What is the rest operator?", options:["...args","args...","&args","args&"], ans:0},
  {q:"What is the difference between spread and rest?", options:["Spread expands, rest collects","Rest expands, spread collects","Both expand","Both collect"], ans:0},
  {q:"What is a JavaScript class?", options:["Blueprint for objects","Function","Array","Object"], ans:0},
  {q:"How do you create a class?", options:["class MyClass {}","Class MyClass {}","create class MyClass","object MyClass {}"], ans:0},
  {q:"What is a constructor in a class?", options:["constructor() method","init() method","build() method","create() method"], ans:0},
  {q:"What is inheritance in classes?", options:["extends keyword","inherits keyword","super keyword","parent keyword"], ans:0},
  {q:"What is the super keyword?", options:["Call parent constructor","Call child constructor","Call function","Call method"], ans:0},
  {q:"What is a static method?", options:["Called on class, not instance","Called on instance","Called on object","Called on function"], ans:0},
  {q:"What are getters and setters?", options:["get and set keywords","getter and setter methods","accessor methods","All of above"], ans:3},
  {q:"What is a module in JavaScript?", options:["Export/import code between files","Function","Class","Object"], ans:0},
  {q:"How do you export a function?", options:["export function myFunc() {}","module.exports = myFunc","exports.myFunc = myFunc","All of above"], ans:3},
  {q:"How do you import a function?", options:["import { myFunc } from './file.js'","import myFunc from './file.js'","require('./file.js')","All of above"], ans:3},
  {q:"What is default export?", options:["export default myFunc","export myFunc","default export myFunc","export = myFunc"], ans:0},
  {q:"What is the difference between named and default export?", options:["Named: multiple per file, Default: one per file","Default: multiple, Named: one","Both multiple","Both single"], ans:0},
  {q:"What is a Promise?", options:["Async operation result","Sync operation","Callback","Event"], ans:0},
  {q:"What are Promise states?", options:["Pending, Fulfilled, Rejected","Start, End, Error","Waiting, Done, Fail","Open, Close, Error"], ans:0},
  {q:"How do you create a Promise?", options:["new Promise((resolve, reject) => {})","Promise.create()","new MyPromise()","Promise()"], ans:0},
  {q:"What does Promise.resolve() do?", options:["Returns resolved Promise","Returns rejected Promise","Returns pending Promise","Returns Promise"], ans:0},
  {q:"What does Promise.reject() do?", options:["Returns rejected Promise","Returns resolved Promise","Returns pending Promise","Returns Promise"], ans:0},
  {q:"What is Promise.all()?", options:["Waits for all Promises","Waits for first Promise","Waits for any Promise","Waits for last Promise"], ans:0},
  {q:"What is Promise.race()?", options:["Returns first settled Promise","Returns all Promises","Returns last Promise","Returns fastest Promise"], ans:0},
  {q:"What is Promise.any()?", options:["Returns first fulfilled Promise","Returns first rejected","Returns all fulfilled","Returns all rejected"], ans:0},
  {q:"What is Promise.allSettled()?", options:["Returns all settled values","Returns all fulfilled","Returns all rejected","Returns first settled"], ans:0},
  {q:"What is async function?", options:["function that returns a Promise","synchronous function","callback function","arrow function"], ans:0},
  {q:"What does await do?", options:["Waits for Promise resolution","Pauses function","Resumes function","All of above"], ans:3},
  {q:"Can you use await without async?", options:["No","Yes","Depends","Only in modules"], ans:0},
  {q:"What is the output of async function test() { return 5; } test();", options:["Promise {5}","5","undefined","null"], ans:0},
  {q:"What is the purpose of for...of loop?", options:["Iterate over iterable values","Iterate over object keys","Iterate over array indexes","Iterate over numbers"], ans:0},
  {q:"What is the purpose of for...in loop?", options:["Iterate over enumerable properties","Iterate over values","Iterate over array","Iterate over set"], ans:0},
  {q:"What is the difference between for...of and for...in?", options:["for...of values, for...in keys","for...in values, for...of keys","Both iterate values","Both iterate keys"], ans:0},
  {q:"What is a Set?", options:["Collection of unique values","Collection of duplicate values","Array","Object"], ans:0},
  {q:"What is a Map?", options:["Key-value pairs","Array","Set","Object"], ans:0},
  {q:"What is WeakSet?", options:["Set with weak references","Weak set","Strong set","Normal set"], ans:0},
  {q:"What is WeakMap?", options:["Map with weak references","Weak map","Strong map","Normal map"], ans:0},
  {q:"What is a Symbol?", options:["Unique primitive","String","Number","Boolean"], ans:0},
  {q:"What is BigInt?", options:["Large integer","Large float","Large string","Large array"], ans:0},
  {q:"What is the optional chaining operator?", options:["?.",".?","?","??"], ans:0},
  {q:"What does optional chaining do?", options:["Safe property access","Safe function call","Safe array access","All of above"], ans:3},
  {q:"What is the nullish coalescing operator?", options:["??","||","&&","?"], ans:0},
  {q:"What is the difference between ?? and ||?", options:["?? checks null/undefined, || checks falsy","|| checks null/undefined","Both same","?? checks falsy"], ans:0},
  {q:"What is the logical assignment operator?", options:["||=","&&=","??=","All of above"], ans:3},
  {q:"What is the numeric separator?", options:["1_000_000","1,000,000","1.000.000","1-000-000"], ans:0},
  {q:"What is the globalThis object?", options:["Global object across environments","Window object","Global object","This object"], ans:0},
  {q:"What is the purpose of String.prototype.includes()?", options:["Check if string contains substring","Check if string starts with","Check if string ends with","Check if string matches"], ans:0},
  {q:"What is the purpose of String.prototype.startsWith()?", options:["Check if string starts with","Check if string contains","Check if string ends with","Check if string matches"], ans:0},
  {q:"What is the purpose of String.prototype.endsWith()?", options:["Check if string ends with","Check if string starts with","Check if string contains","Check if string matches"], ans:0},
  {q:"What is the purpose of String.prototype.repeat()?", options:["Repeat string n times","Repeat array n times","Repeat number n times","Repeat object n times"], ans:0},
  {q:"What is the purpose of String.prototype.padStart()?", options:["Pad string at start","Pad string at end","Pad string both sides","Pad string at middle"], ans:0},
  {q:"What is the purpose of String.prototype.padEnd()?", options:["Pad string at end","Pad string at start","Pad string both sides","Pad string at middle"], ans:0},
  {q:"What is the purpose of String.prototype.trimStart()?", options:["Remove whitespace from start","Remove whitespace from end","Remove whitespace from both","Remove whitespace from middle"], ans:0},
  {q:"What is the purpose of String.prototype.trimEnd()?", options:["Remove whitespace from end","Remove whitespace from start","Remove whitespace from both","Remove whitespace from middle"], ans:0},
  {q:"What is the purpose of Array.prototype.flat()?", options:["Flatten nested arrays","Filter array","Map array","Reduce array"], ans:0},
  {q:"What is the purpose of Array.prototype.flatMap()?", options:["Map then flatten","Flatten then map","Filter then map","Map then filter"], ans:0},
  {q:"What is the purpose of Object.fromEntries()?", options:["Convert array of pairs to object","Convert object to array","Convert map to object","Convert set to object"], ans:0},
  {q:"What is the purpose of Object.entries()?", options:["Convert object to array of pairs","Convert array to object","Convert map to object","Convert set to object"], ans:0},
  {q:"What is the purpose of Object.values()?", options:["Get object values","Get object keys","Get object entries","Get object pairs"], ans:0},
  {q:"What is the purpose of Object.keys()?", options:["Get object keys","Get object values","Get object entries","Get object pairs"], ans:0},
  {q:"What is the purpose of Object.assign()?", options:["Copy object properties","Merge objects","Clone object","All of above"], ans:3},
  {q:"What is the purpose of Object.freeze()?", options:["Prevent modifications","Prevent extensions","Seal object","Lock object"], ans:0},
  {q:"What is the purpose of Object.seal()?", options:["Prevent adding/deleting properties","Prevent modifications","Freeze object","Lock object"], ans:0},
  {q:"What is the difference between Object.freeze() and Object.seal()?", options:["Freeze prevents modifications, seal prevents add/delete","Both prevent modifications","Seal prevents modifications","Freeze prevents add/delete"], ans:0},
  {q:"What is the purpose of Symbol.iterator?", options:["Define iteration behavior","Define symbol","Define iterator","Define loop"], ans:0},
  {q:"What is a generator function?", options:["function* with yield","async function","arrow function","callback function"], ans:0},
  {q:"What does yield do in a generator?", options:["Pause and return value","Return value","Throw error","Break execution"], ans:0},
  {q:"What does next() do on a generator?", options:["Resume execution","Stop execution","Pause execution","Restart execution"], ans:0},
  {q:"What is a TypedArray in JavaScript?", options:["Array of specific type","Regular array","Object array","String array"], ans:0},
  {q:"What is ArrayBuffer?", options:["Raw binary data buffer","Array of buffers","Buffer of arrays","Data buffer"], ans:0},
  {q:"What is DataView?", options:["View ArrayBuffer data","View array data","View object data","View string data"], ans:0},
  {q:"What is the purpose of Proxy?", options:["Customize object operations","Create proxy server","Network proxy","API proxy"], ans:0},
  {q:"What are the Proxy traps?", options:["get, set, deleteProperty, etc","traps","hooks","interceptors"], ans:0},
  {q:"What is Reflect API?", options:["Built-in methods for interceptable operations","Reflection API","Mirror API","Copy API"], ans:0},
  {q:"What is the purpose of Intl object?", options:["Internationalization","Internet","Integration","Interface"], ans:0},
  {q:"What does Intl.DateTimeFormat do?", options:["Format dates for locale","Format numbers","Format currencies","Format strings"], ans:0},
  {q:"What does Intl.NumberFormat do?", options:["Format numbers for locale","Format dates","Format currencies","Format strings"], ans:0}
];

let index=0;
let answers=new Array(questions.length).fill(undefined);
let status=new Array(questions.length).fill("notVisited");
let time=3600,timerInterval;

/* LOGIN */
function loginUser(){
let name=user.value.trim();
let mobile=pass.value.trim();

if(name.length<2){ loginMsg.innerText="Enter valid name"; return;}
if(!/^\d{10}$/.test(mobile)){ loginMsg.innerText="Enter valid mobile"; return;}

window.studentName=name;

login.style.display="none";
exam.style.display="block";

startTimer();
loadQ();
}

/* TIMER */
function startTimer(){
timerInterval=setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
timer.innerText=`Time: ${m}:${s.toString().padStart(2,'0')}`;
if(time<=0) submitExam();
},1000);
}

/* LOAD */
function loadQ(){
if(status[index]==="notVisited") status[index]="notAnswered";

let q=questions[index];
question.innerText=(index+1)+". "+q.q;

let html="";
q.options.forEach(opt=>{
let checked=(answers[index]===opt)?"checked":"";
html+=`<label class="option">
<input type="radio" name="q${index}" ${checked}
onchange="selectOption('${opt}')"> ${opt}
</label>`;
});
options.innerHTML=html;

updateCounter();
loadPalette();
}

function selectOption(val){ answers[index]=val; status[index]="answered"; loadPalette(); }
function prev(){ if(index>0){index--; loadQ();}}
function saveAndNext(){ if(index<questions.length-1){index++; loadQ();}}
function clearAnswer(){ answers[index]=undefined; status[index]="notAnswered"; loadQ(); }
function markReview(){ status[index]="review"; loadPalette(); }

function updateCounter(){
counter.innerText=`Answered: ${answers.filter(a=>a!==undefined).length}/${questions.length}`;
}

function loadPalette(){
let html="";
for(let i=0;i<questions.length;i++){
let color="#ccc";
if(status[i]=="answered") color="green";
else if(status[i]=="notAnswered") color="red";
else if(status[i]=="review") color="orange";

html+=`<button class="palette-btn" style="background:${color}" onclick="goTo(${i})">${i+1}</button>`;
}
palette.innerHTML=html;
}

function goTo(i){ index=i; loadQ(); }
function confirmSubmit(){ if(confirm("Submit exam?")) submitExam(); }

/* RESULT */
function submitExam(){
clearInterval(timerInterval);

exam.style.display="none";
result.style.display="block";

/* HEADER INFO */
let now=new Date();
studentInfo.innerText=`Name: ${window.studentName} | Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}`;

let correct=0,wrong=0,unattempted=0;

questions.forEach((q,i)=>{
if(answers[i]===undefined) unattempted++;
else if(answers[i]===q.options[q.ans]) correct++;
else wrong++;
});

tTotal.innerText=questions.length;
tCorrect.innerText=correct;
tWrong.innerText=wrong;
tUnattempted.innerText=unattempted;
tScore.innerText=((correct/questions.length)*100).toFixed(1)+"%";

/* ✅ PERFECT CHARTS */
new Chart(pieChart,{
type:"pie",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

new Chart(barChart,{
type:"bar",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

generateReview();
}

/* REVIEW */
function generateReview(){
let html="";
questions.forEach((q,i)=>{
let bg="unattempted-bg";
if(answers[i]===q.options[q.ans]) bg="correct-bg";
else if(answers[i]!==undefined) bg="wrong-bg";

html+=`<div class="review-box ${bg}">
<b>Q${i+1}: ${q.q}</b><br>`;
q.options.forEach(opt=>{
let style="";
if(opt===q.options[q.ans]) style="color:green;font-weight:bold;";
if(opt===answers[i] && opt!==q.options[q.ans]) style="color:red;";
html+=`<div style="${style}">${opt}</div>`;
});
html+="</div>";
});
review.innerHTML=html;
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;

const pdf = new jsPDF('p','mm','a4');
let y = 10;

/* HEADER */
let now = new Date();
pdf.setFontSize(12);
pdf.text(`Name: ${window.studentName}`,10,y);
y+=6;
pdf.text(`Date: ${now.toLocaleDateString()}`,10,y);
y+=6;
pdf.text(`Time: ${now.toLocaleTimeString()}`,10,y);
y+=10;

/* SUMMARY */
pdf.text(`Total: ${questions.length}`,10,y); y+=6;
pdf.text(`Correct: ${tCorrect.innerText}`,10,y); y+=6;
pdf.text(`Wrong: ${tWrong.innerText}`,10,y); y+=6;
pdf.text(`Not Attempted: ${tUnattempted.innerText}`,10,y); y+=6;
pdf.text(`Score: ${tScore.innerText}`,10,y); y+=10;

/* QUESTIONS */
questions.forEach((q,i)=>{
let text = `Q${i+1}: ${q.q}`;
let splitQ = pdf.splitTextToSize(text, 180);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitQ,10,y);
y += splitQ.length * 6;

/* OPTIONS */
q.options.forEach((opt,idx)=>{
let label = "";

if(idx === q.ans){
label = `✔ ${opt}`; // correct
}else if(opt === answers[i]){
label = `✘ ${opt}`; // wrong selected
}else{
label = `- ${opt}`;
}

let splitOpt = pdf.splitTextToSize(label, 170);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitOpt,15,y);
y += splitOpt.length * 5;
});

y+=4;
});

pdf.save("Full_Result.pdf");
}

</script>

</body>
</html>
