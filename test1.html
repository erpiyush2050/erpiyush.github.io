<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJD Education Full Exam</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;margin:0;background:#eef3f8}
header{background:#0d6efd;color:white;text-align:center;padding:15px}
.main{display:flex}
.palette{width:230px;background:white;height:100vh;overflow:auto;border-right:2px solid #ddd;padding:10px}
.palette button{width:45px;height:40px;margin:4px;border:none;border-radius:6px;background:#dee2e6;cursor:pointer}
.palette button.answered{background:#198754;color:white}
.container{flex:1;padding:20px}
.question{background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.2)}
.option{display:block;margin:8px 0;padding:8px;background:#f1f3f5;border-radius:8px;cursor:pointer}
.timer{float:right;font-size:20px;color:red;font-weight:bold}
button.nav{background:#0d6efd;color:white;border:none;padding:10px 20px;border-radius:8px;margin:5px}
.result{display:none;background:white;margin-top:20px;padding:20px;border-radius:10px}
</style>
</head>
<body>
<header>
<h2>OJD Education</h2>
<h4>Trainer: Piyush Dixit</h4>
<h3>Computer & IT Fundamentals Exam</h3>
</header>

<div class="main">
<div class="palette" id="palette"></div>

<div class="container">
<label>Student Name:</label>
<input type="text" id="sname" style="width:100%;padding:8px;margin-bottom:10px">
<div class="timer">Time: <span id="time">45:00</span></div>

<div id="qbox" class="question"></div>
<button class="nav" onclick="prevQ()">Previous</button>
<button class="nav" onclick="nextQ()">Next</button>
<button class="nav" onclick="submitQuiz()">Submit</button>

<div class="result" id="result">
<h2 id="rname"></h2>
<h3 id="rscore"></h3>
<canvas id="chart"></canvas>
</div>

</div>
</div>

setInterval(()=>{
duration--;
let m=Math.floor(duration/60);
let s=duration%60;
document.getElementById("time").innerText=m+":"+(s<10?"0":"")+s;
if(duration<=0) submitQuiz();
},1000);

{type:'tf',q:'ENIAC was first generation.',a:true},
{type:'tf',q:'Printer is input device.',a:false},

{type:'tf',q:'Extension identifies file.',a:true},
{type:'tf',q:'Multitasking absent.',a:false},
{type:'tf',q:'Antivirus application.',a:false},
{type:'tf',q:'Transistor third gen.',a:false},
{type:'tf',q:'Multiple printers default.',a:true},

let index=1;
let answers=new Array(questions.length);

function buildPalette(){
let p='';
questions.forEach((q,i)=>{if(q.type!='section')p+=`<button id='p${i}' onclick='jump(${i})'>${i}</button>`});
document.getElementById('palette').innerHTML=p;
}

function loadQ(){
let q=questions[index];
if(q.type=='section'){index++; loadQ(); return}
let html=`<h3>Q${index}. ${q.q}</h3>`;
if(q.type=='mcq'){
q.o.forEach((op,i)=>html+=`<label class='option'><input type='radio' name='opt' value='${i}'> ${op}</label>`);
}else{
html+=`<label class='option'><input type='radio' name='opt' value='true'> True</label>
<label class='option'><input type='radio' name='opt' value='false'> False</label>`;
}
document.getElementById('qbox').innerHTML=html;
}

function save(){
let s=document.querySelector("input[name=opt]:checked");
if(s){answers[index]=s.value;document.getElementById('p'+index)?.classList.add('answered');}
}

function nextQ(){save(); if(index<questions.length-1){index++; loadQ();}}
function prevQ(){save(); if(index>1){index--; loadQ();}}
function jump(i){save(); index=i; loadQ();}

function submitQuiz(){
save();
let score=0,correct=0,wrong=0;
questions.forEach((q,i)=>{
if(q.type=='mcq'){
if(Number(answers[i])===q.a){score+=1; correct++;}
else if(answers[i]!=null){score-=0.25; wrong++;}
}
if(q.type=='tf'){
if(answers[i]==q.a?.toString()){score+=1; correct++;}
else if(answers[i]!=null){score-=0.25; wrong++;}
}
});

document.getElementById('result').style.display='block';
document.getElementById('rname').innerText='Student: '+document.getElementById('sname').value;
document.getElementById('rscore').innerText='Score: '+score.toFixed(2);

new Chart(document.getElementById('chart'),{type:'pie',data:{labels:['Correct','Wrong'],datasets:[{data:[correct,wrong]}]}});
}

buildPalette();
loadQ();
</script>
</body>
</html>
