<!DOCTYPE html>
<html>
<head>
<title>O level - CBT Exam</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

.login-container{
height:100vh; display:flex; justify-content:center; align-items:center;
background:linear-gradient(135deg,#007bff,#00c6ff);
}
.login-box{
background:white; padding:40px; border-radius:15px; width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;
}

.header {
background:#1a73e8;color:white;padding:15px;
display:flex;justify-content:space-between;align-items:center;
}

.container { display:flex; height:85vh; }
.left { width:20%; background:#fff; padding:10px; overflow:auto; }
.right { width:80%; padding:20px; }

.option {
display:block;padding:12px;margin:8px 0;background:#eee;border-radius:8px;cursor:pointer;
}

.btn{
padding:10px 18px;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;margin:5px;
}
.blue{ background:#007bff; }
.green{ background:#28a745; }
.yellow{ background:#ffc107; color:black; }
.red{ background:#dc3545; }

.palette-btn {width:40px;height:40px;margin:5px;border:none;border-radius:6px;}

.result-card{background:white;padding:25px;border-radius:15px;max-width:1200px;margin:20px auto;}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;}
.score-box{background:#f8f9fc;padding:15px;border-radius:10px;text-align:center;}

/* ✅ PERFECT CHART ALIGNMENT */
.chart-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.chart-box{
height:320px;
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}
.chart-box:hover{
transform:scale(1.02);
}

.review-box{padding:12px;margin:10px 0;border-radius:8px;}
.correct-bg{ background:#d4edda; }
.wrong-bg{ background:#f8d7da; }
.unattempted-bg{ background:#fff3cd; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
<div class="login-box">
<h2>O Level - CBT Login</h2>
<input id="user" placeholder="Enter Name"><br><br>
<input id="pass" placeholder="Enter Mobile"><br><br>
<button class="btn blue" onclick="loginUser()">Start Exam</button>
<p id="loginMsg"></p>
</div>
</div>

<!-- EXAM -->
<div id="exam" style="display:none;">
<div class="header">
<div>JavaScript Part 1 - CBT Examination Portal</div>
<div id="timer"></div>
</div>

<div class="container">
<div class="left"><div id="palette"></div></div>

<div class="right">
<h4 id="counter"></h4>
<h3 id="question"></h3>
<div id="options"></div>

<div>
<button class="btn blue" onclick="prev()">Prev</button>
<button class="btn green" onclick="saveAndNext()">Next</button>
<button class="btn yellow" onclick="markReview()">Mark Review</button>
<button class="btn yellow" onclick="clearAnswer()">Clear</button>
<button class="btn red" onclick="confirmSubmit()">Submit</button>
</div>
</div>
</div>
</div>

<!-- RESULT -->
<div id="result" style="display:none;">
<div class="header">
<div>
📊 Result Dashboard<br>
<small id="studentInfo"></small>
</div>
<button class="btn green" onclick="downloadPDF()">Download PDF</button>
</div>

<div id="resultContent" class="result-card">

<div class="score-grid">
<div class="score-box">Total<br><b id="tTotal"></b></div>
<div class="score-box">Correct<br><b id="tCorrect"></b></div>
<div class="score-box">Wrong<br><b id="tWrong"></b></div>
<div class="score-box">Not Attempted<br><b id="tUnattempted"></b></div>
<div class="score-box">Score<br><b id="tScore"></b></div>
</div>

<!-- ✅ CHARTS TOGETHER -->
<div class="chart-container">
  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>
</div>

<h3>📝 Question Review</h3>
<div id="review"></div>

</div>
</div>

<script>

/* Basic CSS questions */
const questions = [
  {q:"What does JavaScript stand for?", options:["JavaScript","Java","JScript","ECMAScript"], ans:0},
  {q:"Who created JavaScript?", options:["Brendan Eich","Guido van Rossum","Dennis Ritchie","James Gosling"], ans:0},
  {q:"In which year was JavaScript created?", options:["1995","1996","1994","1997"], ans:0},
  {q:"What is the correct way to write a JavaScript array?", options:["var colors = ['red', 'green', 'blue'];","var colors = 'red', 'green', 'blue';","var colors = (1:'red', 2:'green', 3:'blue');","var colors = 1='red', 2='green';"], ans:0},
  {q:"How do you write 'Hello World' in an alert box?", options:["alert('Hello World');","msg('Hello World');","alertBox('Hello World');","msgBox('Hello World');"], ans:0},
  {q:"How do you create a function in JavaScript?", options:["function myFunction()","function:myFunction()","def myFunction()","create myFunction()"], ans:0},
  {q:"How do you call a function named 'myFunction'?", options:["myFunction()","call myFunction()","execute myFunction()","run myFunction()"], ans:0},
  {q:"How do you write an if statement in JavaScript?", options:["if (x == 5)","if x == 5 then","if x = 5","if x equals 5"], ans:0},
  {q:"How does a for loop start?", options:["for (i = 0; i < 5; i++)","for i = 0 to 5","for (i = 0; i <= 5)","for (i = 0; i++)"], ans:0},
  {q:"How do you add a comment in JavaScript?", options:["// This is a comment","<!-- This is a comment -->","# This is a comment","/* This is a comment */"], ans:0},
  {q:"What is the correct way to declare a variable in JavaScript?", options:["var x;","v x;","variable x;","declare x;"], ans:0},
  {q:"Which operator is used to assign a value to a variable?", options:["=","==","===","!="], ans:0},
  {q:"What is the result of '5' + 5 in JavaScript?", options:["55","10","5","Error"], ans:0},
  {q:"What is the result of '5' - 2 in JavaScript?", options:["3","'5-2'","52","Error"], ans:0},
  {q:"What is the typeof operator used for?", options:["Return variable type","Return variable value","Return variable name","Return variable length"], ans:0},
  {q:"What is NaN in JavaScript?", options:["Not a Number","Number","Null","Not a Name"], ans:0},
  {q:"What is the difference between == and ===?", options:["== compares value, === compares value and type","== compares type, === compares value","Both same","=== compares only value"], ans:0},
  {q:"What is the purpose of let keyword?", options:["Block-scoped variable","Global variable","Constant variable","Function-scoped variable"], ans:0},
  {q:"What is the purpose of const keyword?", options:["Constant variable","Variable variable","Let variable","Global variable"], ans:0},
  {q:"What is the difference between var and let?", options:["var is function-scoped, let is block-scoped","let is function-scoped, var is block-scoped","Both same","Both block-scoped"], ans:0},
  {q:"What will console.log(typeof null) output?", options:["object","null","undefined","number"], ans:0},
  {q:"What will console.log(typeof undefined) output?", options:["undefined","null","object","string"], ans:0},
  {q:"What is the Boolean value of 0 in JavaScript?", options:["false","true","undefined","null"], ans:0},
  {q:"What is the Boolean value of an empty string?", options:["false","true","undefined","null"], ans:0},
  {q:"What is the Boolean value of '0' (string zero)?", options:["true","false","undefined","null"], ans:0},
  {q:"What is the increment operator?", options:["++","--","+=","-="], ans:0},
  {q:"What is the decrement operator?", options:["--","++","-=","+="], ans:0},
  {q:"What is the difference between i++ and ++i?", options:["i++ returns then increments, ++i increments then returns","Both same","i++ increments then returns","++i returns then increments"], ans:0},
  {q:"Which operator returns remainder?", options:["%","/","*","**"], ans:0},
  {q:"Which operator performs exponentiation?", options:["**","^","//","%"], ans:0},
  {q:"What is the output of 5 + 3 * 2?", options:["11","16","10","13"], ans:0},
  {q:"What is the output of (5 + 3) * 2?", options:["16","11","10","13"], ans:0},
  {q:"Which logical operator returns true if both are true?", options:["&&","||","!","??"], ans:0},
  {q:"Which logical operator returns true if at least one is true?", options:["||","&&","!","??"], ans:0},
  {q:"Which logical operator inverts the value?", options:["!","&&","||","??"], ans:0},
  {q:"What is the nullish coalescing operator (??)?", options:["Returns right if left is null/undefined","Returns right if left is falsy","Returns left if right is null","Returns left always"], ans:0},
  {q:"What is the ternary operator syntax?", options:["condition ? value1 : value2","if condition then value1 else value2","condition ?: value1 : value2","? condition : value1 value2"], ans:0},
  {q:"What is the output of let x = 10; let y = '10'; console.log(x == y);", options:["true","false","undefined","null"], ans:0},
  {q:"What is the output of let x = 10; let y = '10'; console.log(x === y);", options:["false","true","undefined","null"], ans:0},
  {q:"What is the output of console.log(10 > 5 && 3 < 2);", options:["false","true","undefined","null"], ans:0},
  {q:"What is the output of console.log(10 > 5 || 3 < 2);", options:["true","false","undefined","null"], ans:0},
  {q:"What is the output of console.log(!true);", options:["false","true","undefined","null"], ans:0},
  {q:"What is the output of console.log(5 < 10 ? 'Yes' : 'No');", options:["Yes","No","undefined","null"], ans:0},
  {q:"What is the purpose of the break statement?", options:["Exit loop or switch","Continue loop","Stop program","Return value"], ans:0},
  {q:"What is the purpose of the continue statement?", options:["Skip current iteration","Exit loop","Stop program","Return value"], ans:0},
  {q:"How do you stop a loop in JavaScript?", options:["break","stop","exit","return"], ans:0},
  {q:"What is a while loop?", options:["Loops while condition is true","Loops once","Loops forever","Loops while false"], ans:0},
  {q:"What is a do-while loop?", options:["Runs at least once","Runs only if condition true","Runs never","Runs conditionally"], ans:0},
  {q:"What is the difference between while and do-while?", options:["Do-while runs at least once","While runs at least once","Both same","Do-while checks first"], ans:0},
  {q:"How do you write a switch statement?", options:["switch(x){ case 1: break; }","switch x { case 1: break; }","switch(x) { case 1; break; }","switch x { case 1; break; }"], ans:0},
  {q:"What is the purpose of default in switch?", options:["Runs if no case matches","Default case","First case","Last case"], ans:0},
  {q:"What is the output of '10' + 20 + 30?", options:["102030","60","'102030'","1030"], ans:0},
  {q:"What is the output of 10 + 20 + '30'?", options:["3030","102030","60","'3030'"], ans:0},
  {q:"What is the output of 10 + '20' + 30?", options:["102030","60","3030","'102030'"], ans:0},
  {q:"What is the purpose of parseInt()?", options:["Convert to integer","Convert to string","Convert to float","Convert to boolean"], ans:0},
  {q:"What is the purpose of parseFloat()?", options:["Convert to float","Convert to integer","Convert to string","Convert to boolean"], ans:0},
  {q:"What is the output of parseInt('10.5')?", options:["10","10.5","11","NaN"], ans:0},
  {q:"What is the output of parseFloat('10.5')?", options:["10.5","10","11","NaN"], ans:0},
  {q:"What is the output of Number('10')?", options:["10","'10'","NaN","undefined"], ans:0},
  {q:"What is the output of Number('abc')?", options:["NaN","0","undefined","null"], ans:0},
  {q:"What is the purpose of isNaN()?", options:["Check if value is NaN","Check if number","Check if string","Check if boolean"], ans:0},
  {q:"What is the output of isNaN('abc')?", options:["true","false","undefined","null"], ans:0},
  {q:"What is the output of isNaN(123)?", options:["false","true","undefined","null"], ans:0},
  {q:"What is the purpose of typeof operator?", options:["Return type of variable","Return value","Return name","Return length"], ans:0},
  {q:"What is the output of typeof 42?", options:["number","string","object","boolean"], ans:0},
  {q:"What is the output of typeof 'hello'?", options:["string","number","object","boolean"], ans:0},
  {q:"What is the output of typeof true?", options:["boolean","string","number","object"], ans:0},
  {q:"What is the output of typeof []?", options:["object","array","string","number"], ans:0},
  {q:"What is the output of typeof null?", options:["object","null","undefined","string"], ans:0},
  {q:"What is the output of typeof function(){}?", options:["function","object","string","number"], ans:0},
  {q:"How do you check if a variable is an array?", options:["Array.isArray(x)","isArray(x)","x.isArray()","typeof x === 'array'"], ans:0},
  {q:"What is the purpose of console.log()?", options:["Output to console","Output to alert","Output to window","Output to file"], ans:0},
  {q:"What is the purpose of console.error()?", options:["Output error to console","Output log","Output warn","Output info"], ans:0},
  {q:"What is the purpose of console.warn()?", options:["Output warning to console","Output error","Output log","Output info"], ans:0},
  {q:"What is the purpose of console.table()?", options:["Display data as table","Display as list","Display as tree","Display as grid"], ans:0},
  {q:"What is the purpose of console.time() and console.timeEnd()?", options:["Measure execution time","Log time","Log date","Log timestamp"], ans:0},
  {q:"What is the purpose of debugger statement?", options:["Stop execution and debug","Log to console","Throw error","Return value"], ans:0},
  {q:"What is the purpose of alert()?", options:["Show alert dialog","Show confirm dialog","Show prompt dialog","Log to console"], ans:0},
  {q:"What is the purpose of confirm()?", options:["Show confirm dialog with OK/Cancel","Show alert","Show prompt","Show console"], ans:0},
  {q:"What does confirm() return on OK?", options:["true","false","null","undefined"], ans:0},
  {q:"What does confirm() return on Cancel?", options:["false","true","null","undefined"], ans:0},
  {q:"What is the purpose of prompt()?", options:["Get user input","Show alert","Show confirm","Log to console"], ans:0},
  {q:"What does prompt() return on Cancel?", options:["null","false","true","undefined"], ans:0},
  {q:"What is the purpose of let vs var?", options:["let has block scope, var has function scope","let has function scope","both same","var has block scope"], ans:0},
  {q:"Can you redeclare a variable with let in same scope?", options:["No","Yes","Depends","Sometimes"], ans:0},
  {q:"Can you redeclare a variable with var in same scope?", options:["Yes","No","Depends","Sometimes"], ans:0},
  {q:"What is temporal dead zone?", options:["Cannot access let before declaration","Cannot access var before declaration","Cannot access const after declaration","Cannot access let after declaration"], ans:0},
  {q:"What is the output of let x = 5; { let x = 10; } console.log(x);", options:["5","10","undefined","error"], ans:0},
  {q:"What is the output of var x = 5; { var x = 10; } console.log(x);", options:["10","5","undefined","error"], ans:0},
  {q:"What is the purpose of strict mode?", options:["Enforce better JavaScript","Ignore errors","Allow sloppy code","Disable features"], ans:0},
  {q:"How do you enable strict mode?", options:["'use strict';","strict();","use strict;","enable strict;"], ans:0},
  {q:"What happens in strict mode with undeclared variables?", options:["Throws error","Creates global","Ignores","Warns"], ans:0},
  {q:"What is the purpose of the this keyword?", options:["Refers to current object","Refers to window","Refers to function","Refers to variable"], ans:0},
  {q:"What is the value of this in global scope in browser?", options:["window","global","undefined","null"], ans:0},
  {q:"What is the value of this in a regular function?", options:["window (non-strict), undefined (strict)","undefined","null","global"], ans:0},
  {q:"What is the purpose of arrow functions?", options:["Shorter syntax, lexical this","Longer syntax","No this binding","Block scope"], ans:0}
];
  
let index=0;
let answers=new Array(questions.length).fill(undefined);
let status=new Array(questions.length).fill("notVisited");
let time=3600,timerInterval;

/* LOGIN */
function loginUser(){
let name=user.value.trim();
let mobile=pass.value.trim();

if(name.length<2){ loginMsg.innerText="Enter valid name"; return;}
if(!/^\d{10}$/.test(mobile)){ loginMsg.innerText="Enter valid mobile"; return;}

window.studentName=name;

login.style.display="none";
exam.style.display="block";

startTimer();
loadQ();
}

/* TIMER */
function startTimer(){
timerInterval=setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
timer.innerText=`Time: ${m}:${s.toString().padStart(2,'0')}`;
if(time<=0) submitExam();
},1000);
}

/* LOAD */
function loadQ(){
if(status[index]==="notVisited") status[index]="notAnswered";

let q=questions[index];
question.innerText=(index+1)+". "+q.q;

let html="";
q.options.forEach(opt=>{
let checked=(answers[index]===opt)?"checked":"";
html+=`<label class="option">
<input type="radio" name="q${index}" ${checked}
onchange="selectOption('${opt}')"> ${opt}
</label>`;
});
options.innerHTML=html;

updateCounter();
loadPalette();
}

function selectOption(val){ answers[index]=val; status[index]="answered"; loadPalette(); }
function prev(){ if(index>0){index--; loadQ();}}
function saveAndNext(){ if(index<questions.length-1){index++; loadQ();}}
function clearAnswer(){ answers[index]=undefined; status[index]="notAnswered"; loadQ(); }
function markReview(){ status[index]="review"; loadPalette(); }

function updateCounter(){
counter.innerText=`Answered: ${answers.filter(a=>a!==undefined).length}/${questions.length}`;
}

function loadPalette(){
let html="";
for(let i=0;i<questions.length;i++){
let color="#ccc";
if(status[i]=="answered") color="green";
else if(status[i]=="notAnswered") color="red";
else if(status[i]=="review") color="orange";

html+=`<button class="palette-btn" style="background:${color}" onclick="goTo(${i})">${i+1}</button>`;
}
palette.innerHTML=html;
}

function goTo(i){ index=i; loadQ(); }
function confirmSubmit(){ if(confirm("Submit exam?")) submitExam(); }

/* RESULT */
function submitExam(){
clearInterval(timerInterval);

exam.style.display="none";
result.style.display="block";

/* HEADER INFO */
let now=new Date();
studentInfo.innerText=`Name: ${window.studentName} | Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}`;

let correct=0,wrong=0,unattempted=0;

questions.forEach((q,i)=>{
if(answers[i]===undefined) unattempted++;
else if(answers[i]===q.options[q.ans]) correct++;
else wrong++;
});

tTotal.innerText=questions.length;
tCorrect.innerText=correct;
tWrong.innerText=wrong;
tUnattempted.innerText=unattempted;
tScore.innerText=((correct/questions.length)*100).toFixed(1)+"%";

/* ✅ PERFECT CHARTS */
new Chart(pieChart,{
type:"pie",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

new Chart(barChart,{
type:"bar",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

generateReview();
}

/* REVIEW */
function generateReview(){
let html="";
questions.forEach((q,i)=>{
let bg="unattempted-bg";
if(answers[i]===q.options[q.ans]) bg="correct-bg";
else if(answers[i]!==undefined) bg="wrong-bg";

html+=`<div class="review-box ${bg}">
<b>Q${i+1}: ${q.q}</b><br>`;
q.options.forEach(opt=>{
let style="";
if(opt===q.options[q.ans]) style="color:green;font-weight:bold;";
if(opt===answers[i] && opt!==q.options[q.ans]) style="color:red;";
html+=`<div style="${style}">${opt}</div>`;
});
html+="</div>";
});
review.innerHTML=html;
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;

const pdf = new jsPDF('p','mm','a4');
let y = 10;

/* HEADER */
let now = new Date();
pdf.setFontSize(12);
pdf.text(`Name: ${window.studentName}`,10,y);
y+=6;
pdf.text(`Date: ${now.toLocaleDateString()}`,10,y);
y+=6;
pdf.text(`Time: ${now.toLocaleTimeString()}`,10,y);
y+=10;

/* SUMMARY */
pdf.text(`Total: ${questions.length}`,10,y); y+=6;
pdf.text(`Correct: ${tCorrect.innerText}`,10,y); y+=6;
pdf.text(`Wrong: ${tWrong.innerText}`,10,y); y+=6;
pdf.text(`Not Attempted: ${tUnattempted.innerText}`,10,y); y+=6;
pdf.text(`Score: ${tScore.innerText}`,10,y); y+=10;

/* QUESTIONS */
questions.forEach((q,i)=>{
let text = `Q${i+1}: ${q.q}`;
let splitQ = pdf.splitTextToSize(text, 180);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitQ,10,y);
y += splitQ.length * 6;

/* OPTIONS */
q.options.forEach((opt,idx)=>{
let label = "";

if(idx === q.ans){
label = `✔ ${opt}`; // correct
}else if(opt === answers[i]){
label = `✘ ${opt}`; // wrong selected
}else{
label = `- ${opt}`;
}

let splitOpt = pdf.splitTextToSize(label, 170);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitOpt,15,y);
y += splitOpt.length * 5;
});

y+=4;
});

pdf.save("Full_Result.pdf");
}

</script>

</body>
</html>
