let i=0;
let ans=new Array(questions.length).fill(null);

// TIMER
let time=3600;
let warned=false;

let t=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=m+":"+(s<10?"0"+s:s);

if(time==300 && !warned){
alert("⚠ Only 5 minutes left!");
warned=true;
}

time--;
if(time<=0) submitExam();
},1000);

// LOAD
function load(){
let q=questions[i];
document.getElementById("q").innerHTML="<h3>Q"+(i+1)+": "+q.q+"</h3>";

let h="";
q.options.forEach((o,idx)=>{
let c=ans[i]===idx?"checked":"";
h+=`<label><input type="radio" name="q${i}" ${c} onchange="save(${idx})"> ${o}</label><br>`;
});
document.getElementById("opt").innerHTML=h;
update();
}

function save(x){ans[i]=x;update();}
function next(){if(i<questions.length-1){i++;load();}}
function prev(){if(i>0){i--;load();}}
function clearAns(){ans[i]=null;load();}

// PALETTE
function palette(){
let h="";
for(let j=0;j<questions.length;j++){
h+=`<button id="p${j}" onclick="jump(${j})">${j+1}</button>`;
}
document.getElementById("palette").innerHTML=h;
}

function update(){
for(let j=0;j<questions.length;j++){
let b=document.getElementById("p"+j);
if(!b) continue;
b.className="";
if(ans[j]!=null) b.classList.add("answered");
else b.classList.add("notanswered");
if(j===i) b.classList.add("current");
}
}

function jump(x){i=x;load();}

// SUBMIT
function submitExam(){
clearInterval(t);

document.getElementById("examSection").style.display="none";
document.getElementById("dashboard").style.display="block";

let c=0,w=0,u=0;

questions.forEach((q,idx)=>{
if(ans[idx]==null)u++;
else if(ans[idx]==q.correct)c++;
else w++;
});

let total=questions.length;
let attempted=total-u;

let percent=((c/total)*100).toFixed(2);
let accuracy=((c/attempted)*100 || 0).toFixed(2);

let grade="Fail";
if(percent>=75) grade="A";
else if(percent>=50) grade="B";
else if(percent>=33) grade="C";

document.getElementById("summary").innerHTML=
`
Correct: ${c}<br>
Wrong: ${w}<br>
Unattempted: ${u}<br>
Percentage: ${percent}%<br>
Accuracy: ${accuracy}%<br>
Grade: ${grade}
`;

new Chart(document.getElementById("chart"),{
type:'pie',
data:{labels:["Correct","Wrong","Unattempt"],datasets:[{data:[c,w,u]}]}
});

// SECTION ANALYSIS
let writer=0, calc=0, mixed=0;

questions.forEach((q,idx)=>{
if(idx<50) writer+=ans[idx]==q.correct?1:0;
else if(idx<120) calc+=ans[idx]==q.correct?1:0;
else mixed+=ans[idx]==q.correct?1:0;
});

document.getElementById("section").innerHTML=
`
Writer: ${writer}<br>
Calc: ${calc}<br>
Mixed: ${mixed}
`;

// REVIEW ALL QUESTIONS
let html="";
questions.forEach((q,i)=>{
let cls="";
if(ans[i]==null) cls="unQ";
else if(ans[i]==q.correct) cls="correctQ";
else cls="wrongQ";

html+=`<div class="${cls}" style="padding:12px;margin:10px 0">
<b>Q${i+1}: ${q.q}</b><br>`;

q.options.forEach((opt,idx)=>{
let style="";
if(idx==q.correct) style="color:green;font-weight:bold";
if(ans[i]==idx && idx!=q.correct) style="color:red";
html+=`<p style="${style}">${opt}</p>`;
});

html+="</div>";
});

document.getElementById("reviewBox").innerHTML=html;
}

// PDF
function downloadPDF(){
let w=window.open("");
w.document.write(document.getElementById("dashboard").innerHTML);
w.print();
}

palette();
load();
