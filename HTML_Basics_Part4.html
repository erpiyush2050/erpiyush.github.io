<!DOCTYPE html>
<html>
<head>
<title>O level - CBT Exam</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

.login-container{
height:100vh; display:flex; justify-content:center; align-items:center;
background:linear-gradient(135deg,#007bff,#00c6ff);
}
.login-box{
background:white; padding:40px; border-radius:15px; width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;
}

.header {
background:#1a73e8;color:white;padding:15px;
display:flex;justify-content:space-between;align-items:center;
}

.container { display:flex; height:85vh; }
.left { width:20%; background:#fff; padding:10px; overflow:auto; }
.right { width:80%; padding:20px; }

.option {
display:block;padding:12px;margin:8px 0;background:#eee;border-radius:8px;cursor:pointer;
}

.btn{
padding:10px 18px;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;margin:5px;
}
.blue{ background:#007bff; }
.green{ background:#28a745; }
.yellow{ background:#ffc107; color:black; }
.red{ background:#dc3545; }

.palette-btn {width:40px;height:40px;margin:5px;border:none;border-radius:6px;}

.result-card{background:white;padding:25px;border-radius:15px;max-width:1200px;margin:20px auto;}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;}
.score-box{background:#f8f9fc;padding:15px;border-radius:10px;text-align:center;}

/* ✅ PERFECT CHART ALIGNMENT */
.chart-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.chart-box{
height:320px;
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}
.chart-box:hover{
transform:scale(1.02);
}

.review-box{padding:12px;margin:10px 0;border-radius:8px;}
.correct-bg{ background:#d4edda; }
.wrong-bg{ background:#f8d7da; }
.unattempted-bg{ background:#fff3cd; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
<div class="login-box">
<h2>O Level - CBT Login</h2>
<input id="user" placeholder="Enter Name"><br><br>
<input id="pass" placeholder="Enter Mobile"><br><br>
<button class="btn blue" onclick="loginUser()">Start Exam</button>
<p id="loginMsg"></p>
</div>
</div>

<!-- EXAM -->
<div id="exam" style="display:none;">
<div class="header">
<div>O level - CBT Examination Portal</div>
<div id="timer"></div>
</div>

<div class="container">
<div class="left"><div id="palette"></div></div>

<div class="right">
<h4 id="counter"></h4>
<h3 id="question"></h3>
<div id="options"></div>

<div>
<button class="btn blue" onclick="prev()">Prev</button>
<button class="btn green" onclick="saveAndNext()">Next</button>
<button class="btn yellow" onclick="markReview()">Mark Review</button>
<button class="btn yellow" onclick="clearAnswer()">Clear</button>
<button class="btn red" onclick="confirmSubmit()">Submit</button>
</div>
</div>
</div>
</div>

<!-- RESULT -->
<div id="result" style="display:none;">
<div class="header">
<div>
📊 Result Dashboard<br>
<small id="studentInfo"></small>
</div>
<button class="btn green" onclick="downloadPDF()">Download PDF</button>
</div>

<div id="resultContent" class="result-card">

<div class="score-grid">
<div class="score-box">Total<br><b id="tTotal"></b></div>
<div class="score-box">Correct<br><b id="tCorrect"></b></div>
<div class="score-box">Wrong<br><b id="tWrong"></b></div>
<div class="score-box">Not Attempted<br><b id="tUnattempted"></b></div>
<div class="score-box">Score<br><b id="tScore"></b></div>
</div>

<!-- ✅ CHARTS TOGETHER -->
<div class="chart-container">
  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>
</div>

<h3>📝 Question Review</h3>
<div id="review"></div>

</div>
</div>

<script>

/* Basic HTML questions */
const questions = const questions = [
  {q:"What is the purpose of the 'required' attribute in HTML5 forms?", options:["Makes field optional","Makes field read-only","Makes field mandatory","Makes field hidden"], ans:2},
  {q:"Which input type is used for selecting a color?", options:["colorpicker","col","pickcolor","color"], ans:3},
  {q:"What does the 'pattern' attribute validate?", options:["Number range","Text length","Regular expression","File type"], ans:0},
  {q:"Which attribute disables HTML5 form validation?", options:["novalidate","nocheck","novalidation","disablevalidate"], ans:0},
  {q:"What is the default value of the 'autocomplete' attribute?", options:["off","on","default","auto"], ans:1},
  {q:"Which input type creates a range slider?", options:["slider","range","scroll","scale"], ans:1},
  {q:"What does the 'multiple' attribute allow in file input?", options:["Multiple files","Multiple forms","Multiple submits","Multiple resets"], ans:2},
  {q:"Which attribute sets the maximum value for date input?", options:["maxdate","max","highest","maximum"], ans:1},

  {q:"Which JavaScript method resets a form?", options:["formReset()","reset()","clear()","formClear()"], ans:1},
  {q:"What is the purpose of the <output> tag?", options:["Display output","Store output","Calculate output","Display result of calculation"], ans:3},
  {q:"Which attribute links an input to a datalist?", options:["datalist","list","options","suggest"], ans:1},
  {q:"What pattern matches a 5-digit Indian PIN code?", options:["[0-9]{4}","[0-9]{5}","[0-9]{6}","[0-9]{3}"], ans:1},
  {q:"Which attribute makes a field focus on page load?", options:["focus","autofocus","defaultfocus","loadfocus"], ans:1},
  {q:"What is the difference between GET and POST?", options:["GET is faster","POST is faster","GET has body, POST has URL","GET has URL, POST has body"], ans:3},
  {q:"Which enctype is used for file upload?", options:["text/plain","application/json","multipart/form-data","application/xml"], ans:2},
  {q:"What does the 'accept' attribute specify?", options:["Accepted file types","Accepted values","Accepted length","Accepted format"], ans:0},
  {q:"Which input type is for telephone numbers?", options:["tel","phone","mobile","call"], ans:0},
  {q:"What does the 'formaction' attribute override?", options:["Form method","Form action","Form enctype","Form target"], ans:1},
  {q:"Which attribute disables a form field?", options:["readonly","disable","disabled","off"], ans:2},
  {q:"What is the purpose of the <fieldset> tag?", options:["Group form elements","Set field value","Create legend","Style forms"], ans:0},
  {q:"Which tag defines a caption for fieldset?", options:["<caption>","<legend>","<title>","<label>"], ans:1},
  {q:"What is the default button type inside a form?", options:["button","reset","submit","image"], ans:2},
  {q:"Which input type creates a hidden field?", options:["invisible","hide","hidden","secret"], ans:2},
  {q:"What does the 'readonly' attribute do?", options:["Field cannot be changed","Field is hidden","Field is disabled","Field is submitted"], ans:0},
  {q:"Which input type is for week selection?", options:["week","weekly","wk","weeks"], ans:0},
  {q:"What does the 'minlength' attribute do?", options:["Minimum value","Minimum characters","Minimum length","Minimum number"], ans:2},
  {q:"Which attribute is used for regular expression validation?", options:["regex","pattern","validate","match"], ans:1},
  {q:"What is the purpose of the <iframe> sandbox attribute?", options:["Apply security restrictions","Add styles","Add scripts","Add forms"], ans:0},
  {q:"Which attribute allows fullscreen in iframe?", options:["fullscreen","allowfullscreen","allow-fullscreen","full"], ans:1},
  {q:"What is the correct way to embed a YouTube video?", options:["<iframe src='youtube.com/watch'>","<iframe src='youtube.com/embed/id'>","<video src='youtube.com'>","<embed src='youtube.com'>"], ans:1},
  {q:"Which HTML5 element is used for navigation links?", options:["<navigation>","<nav>","<menu>","<links>"], ans:1},
  {q:"What is the purpose of the <article> tag?", options:["Sidebar content","Footer content","Self-contained content","Header content"], ans:2},
  {q:"Which element defines content aside from main content?", options:["<aside>","<side>","<sidebar>","<extra>"], ans:0},
  {q:"What does the <section> tag represent?", options:["Generic section","Header section","Footer section","Navigation section"], ans:0},
  {q:"Which tag is used for the main content of a document?", options:["<body>","<main>","<content>","<primary>"], ans:1},
  {q:"What is the purpose of the <header> tag?", options:["Introductory content","Footer content","Navigation content","Side content"], ans:0},
  {q:"Which tag defines a footer for a document?", options:["<bottom>","<footer>","<end>","<foot>"], ans:1},
  {q:"What does the <figure> tag represent?", options:["Self-contained content","Table","List","Form"], ans:0},
  {q:"Which tag provides a caption for <figure>?", options:["<caption>","<legend>","<figcaption>","<title>"], ans:2},
  {q:"What is the purpose of the <mark> tag?", options:["Bold text","Italic text","Highlighted text","Underlined text"], ans:2},
  {q:"Which tag is used for time and date?", options:["<date>","<time>","<datetime>","<calendar>"], ans:1},
  {q:"What does the <progress> tag represent?", options:["Progress bar","Meter","Gauge","Scale"], ans:0},
  {q:"Which tag is used for a measurement?", options:["<progress>","<meter>","<gauge>","<measure>"], ans:1},
  {q:"What is the purpose of the <details> tag?", options:["Create dropdown","Create tooltip","Show/hide content","Create alert"], ans:2},
  {q:"Which tag defines a summary for <details>?", options:["<sum>","<summary>","<caption>","<head>"], ans:1},
  {q:"What does the <dialog> tag represent?", options:["Dialog box","Alert box","Confirm box","Prompt box"], ans:0},
  {q:"Which HTML5 element is used for embedding audio?", options:["<sound>","<audio>","<music>","<mp3>"], ans:1},
  {q:"Which attribute adds controls to audio?", options:["control","player","play","controls"], ans:3},
  {q:"What does the 'autoplay' attribute do?", options:["Play automatically","Play once","Play loop","Play muted"], ans:0},
  {q:"Which tag is used for embedding video?", options:["<media>","<video>","<movie>","<mp4>"], ans:1},
  {q:"What does the 'poster' attribute specify?", options:["Image before play","Image after play","Image during play","Image as background"], ans:0},
  {q:"Which attribute makes video loop?", options:["repeat","loop","cycle","again"], ans:1},
  {q:"What is the purpose of the <source> tag?", options:["Specify media sources","Specify image source","Specify link source","Specify script source"], ans:0},
  {q:"Which video format is natively supported by HTML5?", options:["AVI","MP4","MKV","MOV"], ans:1},
  {q:"Which audio format is widely supported?", options:["WAV","MP3","OGG","AAC"], ans:1},
  {q:"What is the purpose of CSS Flexbox?", options:["One-dimensional layout","Two-dimensional layout","Text styling","Animation"], ans:0},
  {q:"Which CSS property creates a grid layout?", options:["display:flex","display:grid","display:block","display:inline"], ans:1},
  {q:"What is responsive web design?", options:["Fixed layout","Adapts to screen size","Uses frames","Uses tables"], ans:1},
  {q:"What is the viewport meta tag used for?", options:["Set page title","Set keywords","Control mobile layout","Set description"], ans:2},
  {q:"Which CSS feature is used for responsive breakpoints?", options:["@media","@import","@font-face","@keyframes"], ans:0},
  {q:"What is the difference between responsive and adaptive?", options:["Same thing","Responsive uses fluid grids, adaptive uses breakpoints","Adaptive uses fluid grids","No difference"], ans:1},
  {q:"What is a fluid layout?", options:["Uses percentages","Uses pixels","Uses em","Uses rem"], ans:0},
  {q:"What is the purpose of the <iframe> tag?", options:["Embed external page","Embed image","Embed video","Embed audio"], ans:0},
  {q:"Which attribute removes iframe border?", options:["border='0'","frameborder='0'","border='none'","frameborder='none'"], ans:1},
  {q:"What is lazy loading in iframe?", options:["Load immediately","Load on demand","Load with delay","Load when visible"], ans:3},
  {q:"Which attribute enables lazy loading?", options:["lazy='true'","loading='lazy'","defer","async"], ans:1},
  {q:"What is the 'sandbox' attribute used for?", options:["Security restrictions","Styling","Scripting","Layout"], ans:0},
  {q:"What does 'allow-scripts' in sandbox do?", options:["Allow JavaScript","Allow CSS","Allow HTML","Allow Forms"], ans:0},
  {q:"What does 'allow-forms' in sandbox do?", options:["Allow form submission","Allow scripts","Allow navigation","Allow popups"], ans:0},
  {q:"What is clickjacking?", options:["Hiding iframe","Stealing clicks","Fake buttons","All of above"], ans:3},
  {q:"How to prevent clickjacking?", options:["X-Frame-Options","CSP","Both","None"], ans:2},
  {q:"What is the 'srcdoc' attribute?", options:["Inline HTML content","External source","Style source","Script source"], ans:0},
  {q:"What is the 'allowfullscreen' attribute?", options:["Allow fullscreen","Allow popups","Allow scripts","Allow forms"], ans:0},
  {q:"Which attribute controls referrer policy?", options:["referrer","referrerpolicy","policy","refer"], ans:1},
  {q:"What is the default value of 'sandbox' attribute?", options:["No restrictions","All restrictions","Scripts allowed","Forms allowed"], ans:1},
  {q:"What is the most secure sandbox value?", options:["sandbox=''","sandbox='allow-scripts'","sandbox='allow-forms'","sandbox='allow-same-origin'"], ans:0},
  {q:"What does 'allow-popups' do?", options:["Allow popup windows","Allow alerts","Allow confirms","All of above"], ans:0},
  {q:"What does 'allow-top-navigation' do?", options:["Allow top navigation","Allow same origin","Allow scripts","Allow forms"], ans:0},
  {q:"How to communicate with iframe using JavaScript?", options:["postMessage","sendMessage","iframeMessage","crossMessage"], ans:0},
  {q:"What is the 'onload' event in iframe?", options:["Fires when loaded","Fires when error","Fires when clicked","Fires on hover"], ans:0},
  {q:"What is the <embed> tag used for?", options:["External content","Internal content","Text content","Image content"], ans:0},
  {q:"What is the difference between <embed> and <object>?", options:["No difference","<object> has fallback","<embed> has fallback","Both same"], ans:1},
  {q:"How to embed a PDF?", options:["<embed src='file.pdf'>","<object data='file.pdf'>","<iframe src='file.pdf'>","All of above"], ans:3},
  {q:"How to embed a Flash file?", options:["<embed src='file.swf'>","<object data='file.swf'>","Both","Flash deprecated"], ans:3},
  {q:"What is the purpose of the <template> tag?", options:["Client-side template","Server-side template","Style template","Script template"], ans:0},
  {q:"Which tag is used for client-side data storage?", options:["<storage>","<local>","No tag, use JavaScript","<data>"], ans:2},
  {q:"What is Web Storage?", options:["localStorage and sessionStorage","Cookies","Cache","IndexedDB"], ans:0},
  {q:"What is the difference between localStorage and sessionStorage?", options:["Persistent vs session","Session vs persistent","Both same","No difference"], ans:0},
  {q:"What is IndexedDB?", options:["Database in browser","Server database","SQL database","NoSQL database"], ans:0}
];

let index=0;
let answers=new Array(questions.length).fill(undefined);
let status=new Array(questions.length).fill("notVisited");
let time=3600,timerInterval;

/* LOGIN */
function loginUser(){
let name=user.value.trim();
let mobile=pass.value.trim();

if(name.length<2){ loginMsg.innerText="Enter valid name"; return;}
if(!/^\d{10}$/.test(mobile)){ loginMsg.innerText="Enter valid mobile"; return;}

window.studentName=name;

login.style.display="none";
exam.style.display="block";

startTimer();
loadQ();
}

/* TIMER */
function startTimer(){
timerInterval=setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
timer.innerText=`Time: ${m}:${s.toString().padStart(2,'0')}`;
if(time<=0) submitExam();
},1000);
}

/* LOAD */
function loadQ(){
if(status[index]==="notVisited") status[index]="notAnswered";

let q=questions[index];
question.innerText=(index+1)+". "+q.q;

let html="";
q.options.forEach(opt=>{
let checked=(answers[index]===opt)?"checked":"";
html+=`<label class="option">
<input type="radio" name="q${index}" ${checked}
onchange="selectOption('${opt}')"> ${opt}
</label>`;
});
options.innerHTML=html;

updateCounter();
loadPalette();
}

function selectOption(val){ answers[index]=val; status[index]="answered"; loadPalette(); }
function prev(){ if(index>0){index--; loadQ();}}
function saveAndNext(){ if(index<questions.length-1){index++; loadQ();}}
function clearAnswer(){ answers[index]=undefined; status[index]="notAnswered"; loadQ(); }
function markReview(){ status[index]="review"; loadPalette(); }

function updateCounter(){
counter.innerText=`Answered: ${answers.filter(a=>a!==undefined).length}/${questions.length}`;
}

function loadPalette(){
let html="";
for(let i=0;i<questions.length;i++){
let color="#ccc";
if(status[i]=="answered") color="green";
else if(status[i]=="notAnswered") color="red";
else if(status[i]=="review") color="orange";

html+=`<button class="palette-btn" style="background:${color}" onclick="goTo(${i})">${i+1}</button>`;
}
palette.innerHTML=html;
}

function goTo(i){ index=i; loadQ(); }
function confirmSubmit(){ if(confirm("Submit exam?")) submitExam(); }

/* RESULT */
function submitExam(){
clearInterval(timerInterval);

exam.style.display="none";
result.style.display="block";

/* HEADER INFO */
let now=new Date();
studentInfo.innerText=`Name: ${window.studentName} | Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}`;

let correct=0,wrong=0,unattempted=0;

questions.forEach((q,i)=>{
if(answers[i]===undefined) unattempted++;
else if(answers[i]===q.options[q.ans]) correct++;
else wrong++;
});

tTotal.innerText=questions.length;
tCorrect.innerText=correct;
tWrong.innerText=wrong;
tUnattempted.innerText=unattempted;
tScore.innerText=((correct/questions.length)*100).toFixed(1)+"%";

/* ✅ PERFECT CHARTS */
new Chart(pieChart,{
type:"pie",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

new Chart(barChart,{
type:"bar",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

generateReview();
}

/* REVIEW */
function generateReview(){
let html="";
questions.forEach((q,i)=>{
let bg="unattempted-bg";
if(answers[i]===q.options[q.ans]) bg="correct-bg";
else if(answers[i]!==undefined) bg="wrong-bg";

html+=`<div class="review-box ${bg}">
<b>Q${i+1}: ${q.q}</b><br>`;
q.options.forEach(opt=>{
let style="";
if(opt===q.options[q.ans]) style="color:green;font-weight:bold;";
if(opt===answers[i] && opt!==q.options[q.ans]) style="color:red;";
html+=`<div style="${style}">${opt}</div>`;
});
html+="</div>";
});
review.innerHTML=html;
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;

const pdf = new jsPDF('p','mm','a4');
let y = 10;

/* HEADER */
let now = new Date();
pdf.setFontSize(12);
pdf.text(`Name: ${window.studentName}`,10,y);
y+=6;
pdf.text(`Date: ${now.toLocaleDateString()}`,10,y);
y+=6;
pdf.text(`Time: ${now.toLocaleTimeString()}`,10,y);
y+=10;

/* SUMMARY */
pdf.text(`Total: ${questions.length}`,10,y); y+=6;
pdf.text(`Correct: ${tCorrect.innerText}`,10,y); y+=6;
pdf.text(`Wrong: ${tWrong.innerText}`,10,y); y+=6;
pdf.text(`Not Attempted: ${tUnattempted.innerText}`,10,y); y+=6;
pdf.text(`Score: ${tScore.innerText}`,10,y); y+=10;

/* QUESTIONS */
questions.forEach((q,i)=>{
let text = `Q${i+1}: ${q.q}`;
let splitQ = pdf.splitTextToSize(text, 180);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitQ,10,y);
y += splitQ.length * 6;

/* OPTIONS */
q.options.forEach((opt,idx)=>{
let label = "";

if(idx === q.ans){
label = `✔ ${opt}`; // correct
}else if(opt === answers[i]){
label = `✘ ${opt}`; // wrong selected
}else{
label = `- ${opt}`;
}

let splitOpt = pdf.splitTextToSize(label, 170);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitOpt,15,y);
y += splitOpt.length * 5;
});

y+=4;
});

pdf.save("Full_Result.pdf");
}

</script>

</body>
</html>
