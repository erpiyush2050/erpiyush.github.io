<!DOCTYPE html>
<html>
<head>
<title>O level - CBT Exam</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

.login-container{
height:100vh; display:flex; justify-content:center; align-items:center;
background:linear-gradient(135deg,#007bff,#00c6ff);
}
.login-box{
background:white; padding:40px; border-radius:15px; width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;
}

.header {
background:#1a73e8;color:white;padding:15px;
display:flex;justify-content:space-between;align-items:center;
}

.container { display:flex; height:85vh; }
.left { width:20%; background:#fff; padding:10px; overflow:auto; }
.right { width:80%; padding:20px; }

.option {
display:block;padding:12px;margin:8px 0;background:#eee;border-radius:8px;cursor:pointer;
}

.btn{
padding:10px 18px;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;margin:5px;
}
.blue{ background:#007bff; }
.green{ background:#28a745; }
.yellow{ background:#ffc107; color:black; }
.red{ background:#dc3545; }

.palette-btn {width:40px;height:40px;margin:5px;border:none;border-radius:6px;}

.result-card{background:white;padding:25px;border-radius:15px;max-width:1200px;margin:20px auto;}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;}
.score-box{background:#f8f9fc;padding:15px;border-radius:10px;text-align:center;}

/* ✅ PERFECT CHART ALIGNMENT */
.chart-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.chart-box{
height:320px;
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}
.chart-box:hover{
transform:scale(1.02);
}

.review-box{padding:12px;margin:10px 0;border-radius:8px;}
.correct-bg{ background:#d4edda; }
.wrong-bg{ background:#f8d7da; }
.unattempted-bg{ background:#fff3cd; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
<div class="login-box">
<h2>O Level - CBT Login</h2>
<input id="user" placeholder="Enter Name"><br><br>
<input id="pass" placeholder="Enter Mobile"><br><br>
<button class="btn blue" onclick="loginUser()">Start Exam</button>
<p id="loginMsg"></p>
</div>
</div>

<!-- EXAM -->
<div id="exam" style="display:none;">
<div class="header">
<div>JavaScript Part 2- CBT Examination Portal</div>
<div id="timer"></div>
</div>

<div class="container">
<div class="left"><div id="palette"></div></div>

<div class="right">
<h4 id="counter"></h4>
<h3 id="question"></h3>
<div id="options"></div>

<div>
<button class="btn blue" onclick="prev()">Prev</button>
<button class="btn green" onclick="saveAndNext()">Next</button>
<button class="btn yellow" onclick="markReview()">Mark Review</button>
<button class="btn yellow" onclick="clearAnswer()">Clear</button>
<button class="btn red" onclick="confirmSubmit()">Submit</button>
</div>
</div>
</div>
</div>

<!-- RESULT -->
<div id="result" style="display:none;">
<div class="header">
<div>
📊 Result Dashboard<br>
<small id="studentInfo"></small>
</div>
<button class="btn green" onclick="downloadPDF()">Download PDF</button>
</div>

<div id="resultContent" class="result-card">

<div class="score-grid">
<div class="score-box">Total<br><b id="tTotal"></b></div>
<div class="score-box">Correct<br><b id="tCorrect"></b></div>
<div class="score-box">Wrong<br><b id="tWrong"></b></div>
<div class="score-box">Not Attempted<br><b id="tUnattempted"></b></div>
<div class="score-box">Score<br><b id="tScore"></b></div>
</div>

<!-- ✅ CHARTS TOGETHER -->
<div class="chart-container">
  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>
</div>

<h3>📝 Question Review</h3>
<div id="review"></div>

</div>
</div>

<script>

/* JavaScript questions */
const questions = [
  {q:"What is the correct way to create an array in JavaScript?", options:["let arr = [1, 2, 3];","let arr = (1, 2, 3);","let arr = {1, 2, 3};","let arr = <1, 2, 3>;"], ans:0},
  {q:"How do you access the first element of an array named 'arr'?", options:["arr[0]","arr[1]","arr.first()","arr(0)"], ans:0},
  {q:"Which method adds an element to the end of an array?", options:["push()","pop()","shift()","unshift()"], ans:0},
  {q:"Which method removes the last element from an array?", options:["pop()","push()","shift()","unshift()"], ans:0},
  {q:"Which method adds an element to the beginning of an array?", options:["unshift()","push()","pop()","shift()"], ans:0},
  {q:"Which method removes the first element from an array?", options:["shift()","pop()","push()","unshift()"], ans:0},
  {q:"What is the output of [1, 2, 3].length?", options:["3","2","4","1"], ans:0},
  {q:"Which method joins all array elements into a string?", options:["join()","concat()","slice()","splice()"], ans:0},
  {q:"What is the output of ['a', 'b', 'c'].join('-')?", options:["a-b-c","abc","a,b,c","['a','b','c']"], ans:0},
  {q:"Which method creates a new array by filtering elements?", options:["filter()","map()","reduce()","forEach()"], ans:0},
  {q:"Which method creates a new array by applying a function to each element?", options:["map()","filter()","reduce()","forEach()"], ans:0},
  {q:"Which method reduces an array to a single value?", options:["reduce()","map()","filter()","forEach()"], ans:0},
  {q:"How do you create an empty object in JavaScript?", options:["let obj = {};","let obj = [];","let obj = ();","let obj = <>;"], ans:0},
  {q:"How do you add a property to an object?", options:["obj.name = 'John';","obj->name = 'John';","obj:name = 'John';","obj[name] = 'John';"], ans:0},
  {q:"How do you access a property of an object?", options:["obj.name","obj->name","obj:name","obj[name]"], ans:0},
  {q:"What is the output of typeof {name: 'John'}", options:["object","array","string","function"], ans:0},
  {q:"What is a JavaScript function?", options:["Block of reusable code","Variable","Array","Object"], ans:0},
  {q:"How do you create a function that returns a value?", options:["return value;","exit value;","send value;","give value;"], ans:0},
  {q:"What is a parameter in a function?", options:["Input to function","Output of function","Function name","Function body"], ans:0},
  {q:"What is an argument in a function?", options:["Value passed to parameter","Function name","Return value","Function body"], ans:0},
  {q:"What is the output of (function(){ return 5; })();", options:["5","undefined","null","error"], ans:0},
  {q:"What is a callback function?", options:["Function passed as argument","Function that calls itself","Function that returns value","Arrow function"], ans:0},
  {q:"What is an arrow function?", options:["() => {}","function() {}","function => {}","=> function {}"], ans:0},
  {q:"What is the output of const add = (a, b) => a + b; console.log(add(2, 3));", options:["5","23","undefined","null"], ans:0},
  {q:"What is the difference between function declaration and function expression?", options:["Declaration is hoisted, expression is not","Expression is hoisted","Both hoisted","Neither hoisted"], ans:0},
  {q:"What is a higher-order function?", options:["Function that takes/returns function","Function that returns number","Function that returns string","Function that returns array"], ans:0},
  {q:"What is the output of setTimeout(() => console.log('Hi'), 1000);", options:["After 1 second","Immediately","Never","Error"], ans:0},
  {q:"What is the purpose of setInterval()?", options:["Run function repeatedly","Run function once","Stop function","Delay function"], ans:0},
  {q:"How do you stop setInterval()?", options:["clearInterval()","stopInterval()","endInterval()","killInterval()"], ans:0},
  {q:"What is a closure in JavaScript?", options:["Function with access to outer scope","Closed function","Private function","Public function"], ans:0},
  {q:"What is the output of let x = 10; function outer() { let x = 20; function inner() { console.log(x); } inner(); } outer();", options:["20","10","undefined","null"], ans:0},
  {q:"What is the purpose of bind() method?", options:["Set this value","Bind function to variable","Call function","Create function"], ans:0},
  {q:"What is the purpose of call() method?", options:["Call function with specific this","Call function normally","Create function","Delete function"], ans:0},
  {q:"What is the difference between call() and apply()?", options:["call takes arguments separately, apply takes array","apply takes arguments separately","both same","call takes array"], ans:0},
  {q:"What is the output of 'Hello'.length?", options:["5","4","6","3"], ans:0},
  {q:"Which method converts a string to uppercase?", options:["toUpperCase()","toUpper()","upperCase()","toUppercase()"], ans:0},
  {q:"Which method converts a string to lowercase?", options:["toLowerCase()","toLower()","lowerCase()","toLowercase()"], ans:0},
  {q:"Which method extracts a part of a string?", options:["slice()","substring()","substr()","All of above"], ans:3},
  {q:"What is the output of 'Hello World'.indexOf('World')?", options:["6","0","5","-1"], ans:0},
  {q:"What is the output of 'Hello World'.includes('Hello')?", options:["true","false","0","1"], ans:0},
  {q:"Which method replaces part of a string?", options:["replace()","replaceAll()","Both A and B","change()"], ans:2},
  {q:"What is the output of 'Hello,World'.split(',')?", options:["['Hello', 'World']","'Hello World'","'Hello,World'","['Hello,World']"], ans:0},
  {q:"Which method removes whitespace from both ends?", options:["trim()","strip()","remove()","clean()"], ans:0},
  {q:"What is the output of '10' + 5?", options:["105","15","'15'","'105'"], ans:0},
  {q:"What is the output of parseInt('10.5') + 5?", options:["15","15.5","'10.55'","105"], ans:0},
  {q:"What is the output of parseFloat('10.5') + 5?", options:["15.5","15","'10.55'","105"], ans:0},
  {q:"What is the output of Math.round(4.7)?", options:["5","4","4.7","4.5"], ans:0},
  {q:"What is the output of Math.ceil(4.2)?", options:["5","4","4.2","4.5"], ans:0},
  {q:"What is the output of Math.floor(4.9)?", options:["4","5","4.9","4.5"], ans:0},
  {q:"What is the output of Math.random()?", options:["Between 0 and 1","Between 0 and 10","Between 0 and 100","Between 1 and 10"], ans:0},
  {q:"What is the output of Math.max(1, 5, 3)?", options:["5","1","3","6"], ans:0},
  {q:"What is the output of Math.min(1, 5, 3)?", options:["1","5","3","0"], ans:0},
  {q:"What is the output of Math.pow(2, 3)?", options:["8","6","9","5"], ans:0},
  {q:"What is the output of Math.sqrt(16)?", options:["4","8","2","16"], ans:0},
  {q:"What is the output of Math.abs(-10)?", options:["10","-10","0","1"], ans:0},
  {q:"What is a Date object in JavaScript?", options:["Represents date and time","Represents number","Represents string","Represents array"], ans:0},
  {q:"How do you create a new Date object?", options:["new Date()","Date()","new date()","create Date()"], ans:0},
  {q:"Which method gets the current year?", options:["getFullYear()","getYear()","getCurrentYear()","year()"], ans:0},
  {q:"Which method gets the current month (0-11)?", options:["getMonth()","getMonthNumber()","getCurrentMonth()","month()"], ans:0},
  {q:"Which method gets the current date (1-31)?", options:["getDate()","getDay()","getCurrentDate()","date()"], ans:0},
  {q:"Which method gets the current day of week (0-6)?", options:["getDay()","getDate()","getWeekday()","day()"], ans:0},
  {q:"Which method gets the current hours?", options:["getHours()","getMinutes()","getSeconds()","getTime()"], ans:0},
  {q:"What is JSON?", options:["JavaScript Object Notation","Java Object Notation","JavaScript Online Notation","Java Online Notation"], ans:0},
  {q:"How do you parse JSON in JavaScript?", options:["JSON.parse()","JSON.stringify()","parseJSON()","stringifyJSON()"], ans:0},
  {q:"How do you convert object to JSON string?", options:["JSON.stringify()","JSON.parse()","object.toString()","object.toJSON()"], ans:0},
  {q:"What is the output of JSON.parse('{\"name\":\"John\"}')?", options:["{name: 'John'}","'{\"name\":\"John\"}'","{name: John}","Error"], ans:0},
  {q:"What is a Promise in JavaScript?", options:["Async operation result","Synchronous operation","Callback","Function"], ans:0},
  {q:"What are the states of a Promise?", options:["Pending, Fulfilled, Rejected","Start, Middle, End","Open, Close, Error","Wait, Done, Fail"], ans:0},
  {q:"How do you handle a resolved Promise?", options:[".then()",".catch()",".finally()",".resolve()"], ans:0},
  {q:"How do you handle a rejected Promise?", options:[".catch()",".then()",".finally()",".reject()"], ans:0},
  {q:"What is async/await?", options:["Syntactic sugar for Promises","New function type","New variable type","New loop type"], ans:0},
  {q:"Which keyword is used before a function for async?", options:["async","await","promise","then"], ans:0},
  {q:"Which keyword is used to wait for a Promise?", options:["await","async","wait","then"], ans:0},
  {q:"What is the purpose of try/catch?", options:["Handle errors","Create loops","Create functions","Create variables"], ans:0},
  {q:"What is the purpose of throw statement?", options:["Throw custom error","Throw value","Throw function","Throw object"], ans:0},
  {q:"What is the output of try { throw new Error('Oops'); } catch(e) { console.log(e.message); }", options:["Oops","Error","Undefined","Null"], ans:0},
  {q:"What is the purpose of finally block?", options:["Always executes","Executes on error","Executes on success","Never executes"], ans:0},
  {q:"What is the output of typeof NaN?", options:["number","NaN","undefined","string"], ans:0},
  {q:"What is the output of isNaN('Hello')?", options:["true","false","undefined","null"], ans:0},
  {q:"What is the output of isNaN(123)?", options:["false","true","undefined","null"], ans:0},
  {q:"What is the output of 0.1 + 0.2 === 0.3?", options:["false","true","undefined","null"], ans:0},
  {q:"What is the purpose of Number.EPSILON?", options:["Floating point precision","Number limit","Maximum number","Minimum number"], ans:0},
  {q:"What is BigInt in JavaScript?", options:["Large integer","Large float","Large string","Large array"], ans:0},
  {q:"How do you create a BigInt?", options:["123n","BigInt(123)","Both A and B","bigint(123)"], ans:2},
  {q:"What is the purpose of Symbol in JavaScript?", options:["Unique identifier","String","Number","Boolean"], ans:0},
  {q:"How do you create a Symbol?", options:["Symbol()","Symbol('id')","Both A and B","new Symbol()"], ans:2},
  {q:"What is a Set in JavaScript?", options:["Collection of unique values","Collection of duplicate values","Array","Object"], ans:0},
  {q:"How do you add a value to a Set?", options:["add()","push()","append()","insert()"], ans:0},
  {q:"What is a Map in JavaScript?", options:["Key-value pairs","Array","Set","Object"], ans:0},
  {q:"How do you set a value in Map?", options:["set()","put()","add()","insert()"], ans:0},
  {q:"What is the difference between Map and Object?", options:["Map can have any key type, Object keys are strings","Object can have any key","Both same","Map keys are strings"], ans:0},
  {q:"What is WeakMap?", options:["Map with weak references","Weak map","Strong map","Normal map"], ans:0},
  {q:"What is WeakSet?", options:["Set with weak references","Weak set","Strong set","Normal set"], ans:0},
  {q:"What is the purpose of Proxy in JavaScript?", options:["Customize object behavior","Proxy server","Network proxy","API proxy"], ans:0},
  {q:"What is Reflect in JavaScript?", options:["Built-in object for interceptable operations","Reflection API","Mirror API","Copy API"], ans:0}
];
  

let index=0;
let answers=new Array(questions.length).fill(undefined);
let status=new Array(questions.length).fill("notVisited");
let time=3600,timerInterval;

/* LOGIN */
function loginUser(){
let name=user.value.trim();
let mobile=pass.value.trim();

if(name.length<2){ loginMsg.innerText="Enter valid name"; return;}
if(!/^\d{10}$/.test(mobile)){ loginMsg.innerText="Enter valid mobile"; return;}

window.studentName=name;

login.style.display="none";
exam.style.display="block";

startTimer();
loadQ();
}

/* TIMER */
function startTimer(){
timerInterval=setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
timer.innerText=`Time: ${m}:${s.toString().padStart(2,'0')}`;
if(time<=0) submitExam();
},1000);
}

/* LOAD */
function loadQ(){
if(status[index]==="notVisited") status[index]="notAnswered";

let q=questions[index];
question.innerText=(index+1)+". "+q.q;

let html="";
q.options.forEach(opt=>{
let checked=(answers[index]===opt)?"checked":"";
html+=`<label class="option">
<input type="radio" name="q${index}" ${checked}
onchange="selectOption('${opt}')"> ${opt}
</label>`;
});
options.innerHTML=html;

updateCounter();
loadPalette();
}

function selectOption(val){ answers[index]=val; status[index]="answered"; loadPalette(); }
function prev(){ if(index>0){index--; loadQ();}}
function saveAndNext(){ if(index<questions.length-1){index++; loadQ();}}
function clearAnswer(){ answers[index]=undefined; status[index]="notAnswered"; loadQ(); }
function markReview(){ status[index]="review"; loadPalette(); }

function updateCounter(){
counter.innerText=`Answered: ${answers.filter(a=>a!==undefined).length}/${questions.length}`;
}

function loadPalette(){
let html="";
for(let i=0;i<questions.length;i++){
let color="#ccc";
if(status[i]=="answered") color="green";
else if(status[i]=="notAnswered") color="red";
else if(status[i]=="review") color="orange";

html+=`<button class="palette-btn" style="background:${color}" onclick="goTo(${i})">${i+1}</button>`;
}
palette.innerHTML=html;
}

function goTo(i){ index=i; loadQ(); }
function confirmSubmit(){ if(confirm("Submit exam?")) submitExam(); }

/* RESULT */
function submitExam(){
clearInterval(timerInterval);

exam.style.display="none";
result.style.display="block";

/* HEADER INFO */
let now=new Date();
studentInfo.innerText=`Name: ${window.studentName} | Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}`;

let correct=0,wrong=0,unattempted=0;

questions.forEach((q,i)=>{
if(answers[i]===undefined) unattempted++;
else if(answers[i]===q.options[q.ans]) correct++;
else wrong++;
});

tTotal.innerText=questions.length;
tCorrect.innerText=correct;
tWrong.innerText=wrong;
tUnattempted.innerText=unattempted;
tScore.innerText=((correct/questions.length)*100).toFixed(1)+"%";

/* ✅ PERFECT CHARTS */
new Chart(pieChart,{
type:"pie",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

new Chart(barChart,{
type:"bar",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

generateReview();
}

/* REVIEW */
function generateReview(){
let html="";
questions.forEach((q,i)=>{
let bg="unattempted-bg";
if(answers[i]===q.options[q.ans]) bg="correct-bg";
else if(answers[i]!==undefined) bg="wrong-bg";

html+=`<div class="review-box ${bg}">
<b>Q${i+1}: ${q.q}</b><br>`;
q.options.forEach(opt=>{
let style="";
if(opt===q.options[q.ans]) style="color:green;font-weight:bold;";
if(opt===answers[i] && opt!==q.options[q.ans]) style="color:red;";
html+=`<div style="${style}">${opt}</div>`;
});
html+="</div>";
});
review.innerHTML=html;
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;

const pdf = new jsPDF('p','mm','a4');
let y = 10;

/* HEADER */
let now = new Date();
pdf.setFontSize(12);
pdf.text(`Name: ${window.studentName}`,10,y);
y+=6;
pdf.text(`Date: ${now.toLocaleDateString()}`,10,y);
y+=6;
pdf.text(`Time: ${now.toLocaleTimeString()}`,10,y);
y+=10;

/* SUMMARY */
pdf.text(`Total: ${questions.length}`,10,y); y+=6;
pdf.text(`Correct: ${tCorrect.innerText}`,10,y); y+=6;
pdf.text(`Wrong: ${tWrong.innerText}`,10,y); y+=6;
pdf.text(`Not Attempted: ${tUnattempted.innerText}`,10,y); y+=6;
pdf.text(`Score: ${tScore.innerText}`,10,y); y+=10;

/* QUESTIONS */
questions.forEach((q,i)=>{
let text = `Q${i+1}: ${q.q}`;
let splitQ = pdf.splitTextToSize(text, 180);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitQ,10,y);
y += splitQ.length * 6;

/* OPTIONS */
q.options.forEach((opt,idx)=>{
let label = "";

if(idx === q.ans){
label = `✔ ${opt}`; // correct
}else if(opt === answers[i]){
label = `✘ ${opt}`; // wrong selected
}else{
label = `- ${opt}`;
}

let splitOpt = pdf.splitTextToSize(label, 170);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitOpt,15,y);
y += splitOpt.length * 5;
});

y+=4;
});

pdf.save("Full_Result.pdf");
}

</script>

</body>
</html>
