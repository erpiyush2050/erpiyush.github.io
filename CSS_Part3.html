<!DOCTYPE html>
<html>
<head>
<title>O level - CBT Exam</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

.login-container{
height:100vh; display:flex; justify-content:center; align-items:center;
background:linear-gradient(135deg,#007bff,#00c6ff);
}
.login-box{
background:white; padding:40px; border-radius:15px; width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;
}

.header {
background:#1a73e8;color:white;padding:15px;
display:flex;justify-content:space-between;align-items:center;
}

.container { display:flex; height:85vh; }
.left { width:20%; background:#fff; padding:10px; overflow:auto; }
.right { width:80%; padding:20px; }

.option {
display:block;padding:12px;margin:8px 0;background:#eee;border-radius:8px;cursor:pointer;
}

.btn{
padding:10px 18px;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;margin:5px;
}
.blue{ background:#007bff; }
.green{ background:#28a745; }
.yellow{ background:#ffc107; color:black; }
.red{ background:#dc3545; }

.palette-btn {width:40px;height:40px;margin:5px;border:none;border-radius:6px;}

.result-card{background:white;padding:25px;border-radius:15px;max-width:1200px;margin:20px auto;}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;}
.score-box{background:#f8f9fc;padding:15px;border-radius:10px;text-align:center;}

/* ✅ PERFECT CHART ALIGNMENT */
.chart-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.chart-box{
height:320px;
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}
.chart-box:hover{
transform:scale(1.02);
}

.review-box{padding:12px;margin:10px 0;border-radius:8px;}
.correct-bg{ background:#d4edda; }
.wrong-bg{ background:#f8d7da; }
.unattempted-bg{ background:#fff3cd; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
<div class="login-box">
<h2>O Level - CBT Login</h2>
<input id="user" placeholder="Enter Name"><br><br>
<input id="pass" placeholder="Enter Mobile"><br><br>
<button class="btn blue" onclick="loginUser()">Start Exam</button>
<p id="loginMsg"></p>
</div>
</div>

<!-- EXAM -->
<div id="exam" style="display:none;">
<div class="header">
<div>CSS Part 3- CBT Examination Portal</div>
<div id="timer"></div>
</div>

<div class="container">
<div class="left"><div id="palette"></div></div>

<div class="right">
<h4 id="counter"></h4>
<h3 id="question"></h3>
<div id="options"></div>

<div>
<button class="btn blue" onclick="prev()">Prev</button>
<button class="btn green" onclick="saveAndNext()">Next</button>
<button class="btn yellow" onclick="markReview()">Mark Review</button>
<button class="btn yellow" onclick="clearAnswer()">Clear</button>
<button class="btn red" onclick="confirmSubmit()">Submit</button>
</div>
</div>
</div>
</div>

<!-- RESULT -->
<div id="result" style="display:none;">
<div class="header">
<div>
📊 Result Dashboard<br>
<small id="studentInfo"></small>
</div>
<button class="btn green" onclick="downloadPDF()">Download PDF</button>
</div>

<div id="resultContent" class="result-card">

<div class="score-grid">
<div class="score-box">Total<br><b id="tTotal"></b></div>
<div class="score-box">Correct<br><b id="tCorrect"></b></div>
<div class="score-box">Wrong<br><b id="tWrong"></b></div>
<div class="score-box">Not Attempted<br><b id="tUnattempted"></b></div>
<div class="score-box">Score<br><b id="tScore"></b></div>
</div>

<!-- ✅ CHARTS TOGETHER -->
<div class="chart-container">
  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>
</div>

<h3>📝 Question Review</h3>
<div id="review"></div>

</div>
</div>

<script>

/* Basic CSS questions */
const questions = [
  {q:"Which CSS property is used to create a transition effect on hover?", options:["transition","animation","transform","keyframes"], ans:0},
  {q:"What is the correct syntax for a 2D rotation?", options:["transform: rotate(45deg);","transform: rotateX(45deg);","transform: rotateY(45deg);","transform: rotateZ(45deg);"], ans:0},
  {q:"Which property is used to delay a CSS transition?", options:["transition-delay","transition-start","transition-wait","transition-pause"], ans:0},
  {q:"What does the scale() function do?", options:["Resizes an element","Rotates an element","Moves an element","Skews an element"], ans:0},
  {q:"Which property is used to specify the duration of a transition?", options:["transition-duration","transition-time","transition-length","transition-speed"], ans:0},
  {q:"What is the purpose of the translate() function?", options:["Moves an element","Rotates an element","Scales an element","Skews an element"], ans:0},
  {q:"Which CSS property is used to create keyframe animations?", options:["@keyframes","animation-keyframes","keyframes","@animation"], ans:0},
  {q:"How do you apply an animation to an element?", options:["animation-name","animation-apply","animation-use","animation-set"], ans:0},
  {q:"Which property sets how many times an animation runs?", options:["animation-iteration-count","animation-repeat","animation-cycle","animation-loop"], ans:0},
  {q:"What is the default value of animation-iteration-count?", options:["1","0","infinite","auto"], ans:0},
  {q:"Which property specifies the direction of an animation?", options:["animation-direction","animation-flow","animation-move","animation-path"], ans:0},
  {q:"What does the skew() function do?", options:["Tilts an element","Rotates an element","Scales an element","Moves an element"], ans:0},
  {q:"Which property controls the timing function of an animation?", options:["animation-timing-function","animation-speed","animation-easing","animation-curve"], ans:0},
  {q:"What is the purpose of the matrix() function?", options:["Combines multiple transforms","Creates a grid","Creates a table","Creates a layout"], ans:0},
  {q:"Which property determines whether an animation plays forwards or backwards?", options:["animation-fill-mode","animation-state","animation-direction","animation-mode"], ans:0},
  {q:"What does the perspective() function do?", options:["Adds 3D depth","Adds shadow","Adds blur","Adds contrast"], ans:0},
  {q:"Which property is used to set the transform origin?", options:["transform-origin","transform-base","transform-start","transform-center"], ans:0},
  {q:"How do you create a 3D rotation around X-axis?", options:["rotateX()","rotate3dX()","Xrotate()","rotate-X()"], ans:0},
  {q:"What does the translate3d() function do?", options:["3D movement","3D rotation","3D scaling","3D skewing"], ans:0},
  {q:"Which property enables 3D space for children elements?", options:["transform-style","transform-3d","transform-space","transform-depth"], ans:0},
  {q:"What is the purpose of backface-visibility property?", options:["Shows/hides back of element","Shows/hides front of element","Shows/hides shadow","Shows/hides border"], ans:0},
  {q:"How do you create a CSS variable named --primary-color?", options:[":root { --primary-color: blue; }","var --primary-color: blue;","$primary-color: blue;","@primary-color: blue;"], ans:0},
  {q:"How do you use a CSS variable?", options:["color: var(--primary-color);","color: get(--primary-color);","color: use(--primary-color);","color: --primary-color;"], ans:0},
  {q:"What is the scope of a CSS variable declared inside a selector?", options:["That selector and its children","Global","Root only","Parent only"], ans:0},
  {q:"How do you change a CSS variable using JavaScript?", options:["element.style.setProperty('--var', 'value')","element.style.var = 'value'","element.setVariable('--var', 'value')","element.variable('--var') = 'value'"], ans:0},
  {q:"Which pseudo-class selects the root element?", options:[":root","html","body","*"], ans:0},
  {q:"What is the purpose of the calc() function?", options:["Perform mathematical calculations","Calculate colors","Calculate animations","Calculate transitions"], ans:0},
  {q:"Which is a valid calc() expression?", options:["width: calc(100% - 20px);","width: calc(100% - 20);","width: calc(100 - 20px);","width: calc(100% - 20);"], ans:0},
  {q:"What does the min() function do?", options:["Returns smallest value","Returns largest value","Clamps value","Calculates average"], ans:0},
  {q:"What does the max() function do?", options:["Returns largest value","Returns smallest value","Clamps value","Calculates average"], ans:0},
  {q:"What does the clamp() function do?", options:["Clamps value between min and max","Clamps value to min","Clamps value to max","Clamps value to average"], ans:0},
  {q:"Which is a valid clamp() syntax?", options:["clamp(100px, 50%, 200px)","clamp(50%, 100px, 200px)","clamp(200px, 50%, 100px)","clamp(50%, 200px, 100px)"], ans:0},
  {q:"What is the purpose of the filter property?", options:["Apply visual effects","Apply animations","Apply transitions","Apply transforms"], ans:0},
  {q:"Which function adds a shadow to an image?", options:["drop-shadow()","shadow()","box-shadow()","text-shadow()"], ans:0},
  {q:"Which function blurs an image?", options:["blur()","blurred()","blur-effect()","blur-shadow()"], ans:0},
  {q:"Which function increases/decreases color saturation?", options:["saturate()","brightness()","contrast()","hue-rotate()"], ans:0},
  {q:"How do you make an image grayscale?", options:["grayscale(100%)","gray(100%)","black-white(100%)","monochrome(100%)"], ans:0},
  {q:"What does the invert() filter do?", options:["Inverts colors","Inverts position","Inverts size","Inverts shape"], ans:0},
  {q:"Which filter adjusts image brightness?", options:["brightness()","light()","luminance()","glow()"], ans:0},
  {q:"Which property is used to create multiple columns of text?", options:["columns","multi-column","column-count","text-columns"], ans:0},
  {q:"How do you specify the gap between columns?", options:["column-gap","gap","column-space","column-margin"], ans:0},
  {q:"Which property adds a line between columns?", options:["column-rule","column-line","column-divider","column-border"], ans:0},
  {q:"What is the purpose of column-span property?", options:["Element spans across columns","Element spans across rows","Element spans across grid","Element spans across flex"], ans:0},
  {q:"Which property controls how content fills columns?", options:["column-fill","column-balance","column-distribute","column-content"], ans:0},
  {q:"What does the shape-outside property do?", options:["Wraps text around a shape","Creates a shape","Outlines a shape","Clips a shape"], ans:0},
  {q:"Which property defines the shape margin?", options:["shape-margin","margin-shape","shape-padding","shape-space"], ans:0},
  {q:"What is the purpose of shape-image-threshold?", options:["Alpha channel threshold","Color threshold","Size threshold","Position threshold"], ans:0},
  {q:"Which property is used to create a CSS region?", options:["flow-into","region","flow","content-flow"], ans:0},
  {q:"What does the hyphens property control?", options:["Text hyphenation","Text spacing","Text alignment","Text decoration"], ans:0},
  {q:"Which property controls the wrapping of long words?", options:["word-wrap","word-break","overflow-wrap","All of above"], ans:3},
  {q:"What is the purpose of text-overflow property?", options:["Handles overflow text","Handles overflow images","Handles overflow divs","Handles overflow spans"], ans:0},
  {q:"How do you add an ellipsis for overflow text?", options:["text-overflow: ellipsis;","text-overflow: dots;","text-overflow: ...;","text-overflow: truncate;"], ans:0},
  {q:"Which property controls writing direction?", options:["direction","text-direction","writing-direction","orientation"], ans:0},
  {q:"What does the unicode-bidi property do?", options:["Handles bidirectional text","Handles unicode","Handles fonts","Handles characters"], ans:0},
  {q:"Which property is used to create a CSS layout using display: flex?", options:["flex-container","flex","flexbox","display: flex"], ans:3},
  {q:"What is the default direction of flex items?", options:["row","column","row-reverse","column-reverse"], ans:0},
  {q:"Which property aligns flex items horizontally?", options:["justify-content","align-items","align-content","align-self"], ans:0},
  {q:"Which property aligns flex items vertically?", options:["align-items","justify-content","align-content","justify-items"], ans:0},
  {q:"What does flex-wrap: wrap do?", options:["Wraps flex items to new line","Prevents wrapping","Wraps text","Wraps container"], ans:0},
  {q:"Which property controls the order of flex items?", options:["order","sequence","index","position"], ans:0},
  {q:"What does flex-grow property control?", options:["Growth factor","Shrink factor","Base size","Order"], ans:0},
  {q:"What does flex-shrink property control?", options:["Shrink factor","Growth factor","Base size","Order"], ans:0},
  {q:"What does flex-basis property define?", options:["Initial size","Growth size","Shrink size","Maximum size"], ans:0},
  {q:"Which is the shorthand for flex-grow, flex-shrink, flex-basis?", options:["flex","flex-all","flex-properties","flex-shorthand"], ans:0},
  {q:"What is the purpose of align-self property?", options:["Overrides align-items for single item","Aligns all items","Aligns container","Aligns parent"], ans:0},
  {q:"Which property creates a gap between flex items?", options:["gap","flex-gap","item-gap","space"], ans:0},
  {q:"What is the purpose of CSS Grid?", options:["Two-dimensional layout","One-dimensional layout","Three-dimensional layout","Four-dimensional layout"], ans:0},
  {q:"How do you define a grid container?", options:["display: grid;","display: flex;","display: block;","display: inline;"], ans:0},
  {q:"Which property defines grid columns?", options:["grid-template-columns","grid-columns","grid-template","grid-col"], ans:0},
  {q:"Which property defines grid rows?", options:["grid-template-rows","grid-rows","grid-template","grid-row"], ans:0},
  {q:"What does fr unit mean in CSS Grid?", options:["Fraction of available space","Fixed ratio","Flexible ratio","Full ratio"], ans:0},
  {q:"How do you create 3 equal columns in grid?", options:["grid-template-columns: 1fr 1fr 1fr;","grid-template-columns: 3fr;","grid-columns: 1fr 1fr 1fr;","columns: 3;"], ans:0},
  {q:"Which property creates gaps between grid items?", options:["gap","grid-gap","grid-row-gap","All of above"], ans:3},
  {q:"How do you place an item in a specific grid column?", options:["grid-column","grid-col","col-start","column"], ans:0},
  {q:"What does grid-column: 1 / 3 mean?", options:["Spans from column line 1 to 3","Starts at column 1","Ends at column 3","Covers columns 1 and 2"], ans:0},
  {q:"Which property aligns grid items horizontally?", options:["justify-items","align-items","justify-content","align-content"], ans:0},
  {q:"Which property aligns grid items vertically?", options:["align-items","justify-items","align-content","justify-content"], ans:0},
  {q:"What is the purpose of grid-template-areas?", options:["Named grid areas","Grid templates","Grid layouts","Grid positions"], ans:0},
  {q:"How do you define a grid area named 'header'?", options:["grid-template-areas: 'header header'","grid-area: header","grid-name: header","grid-section: header"], ans:0},
  {q:"Which property assigns an item to a named area?", options:["grid-area","grid-name","grid-section","grid-assign"], ans:0},
  {q:"What is the purpose of auto-fill in grid?", options:["Creates as many tracks as fit","Fills automatically","Auto creates","Auto generates"], ans:0},
  {q:"What is the purpose of auto-fit in grid?", options:["Stretches tracks to fill container","Fits automatically","Fills grid","Auto adjusts"], ans:0},
  {q:"How do you create a responsive grid with auto-fill?", options:["repeat(auto-fill, minmax(200px, 1fr))","repeat(auto, 200px)","repeat(fill, 200px)","auto-fill(200px)"], ans:0},
  {q:"Which property stacks grid items?", options:["grid","z-index","position","display"], ans:1},
  {q:"How do you center a grid item both axes?", options:["place-self: center;","align-self: center; justify-self: center;","Both A and B","text-align: center;"], ans:2},
  {q:"What is the purpose of minmax() in grid?", options:["Sets min and max track size","Sets min size","Sets max size","Sets size range"], ans:0}
];

let index=0;
let answers=new Array(questions.length).fill(undefined);
let status=new Array(questions.length).fill("notVisited");
let time=3600,timerInterval;

/* LOGIN */
function loginUser(){
let name=user.value.trim();
let mobile=pass.value.trim();

if(name.length<2){ loginMsg.innerText="Enter valid name"; return;}
if(!/^\d{10}$/.test(mobile)){ loginMsg.innerText="Enter valid mobile"; return;}

window.studentName=name;

login.style.display="none";
exam.style.display="block";

startTimer();
loadQ();
}

/* TIMER */
function startTimer(){
timerInterval=setInterval(()=>{
time--;
let m=Math.floor(time/60);
let s=time%60;
timer.innerText=`Time: ${m}:${s.toString().padStart(2,'0')}`;
if(time<=0) submitExam();
},1000);
}

/* LOAD */
function loadQ(){
if(status[index]==="notVisited") status[index]="notAnswered";

let q=questions[index];
question.innerText=(index+1)+". "+q.q;

let html="";
q.options.forEach(opt=>{
let checked=(answers[index]===opt)?"checked":"";
html+=`<label class="option">
<input type="radio" name="q${index}" ${checked}
onchange="selectOption('${opt}')"> ${opt}
</label>`;
});
options.innerHTML=html;

updateCounter();
loadPalette();
}

function selectOption(val){ answers[index]=val; status[index]="answered"; loadPalette(); }
function prev(){ if(index>0){index--; loadQ();}}
function saveAndNext(){ if(index<questions.length-1){index++; loadQ();}}
function clearAnswer(){ answers[index]=undefined; status[index]="notAnswered"; loadQ(); }
function markReview(){ status[index]="review"; loadPalette(); }

function updateCounter(){
counter.innerText=`Answered: ${answers.filter(a=>a!==undefined).length}/${questions.length}`;
}

function loadPalette(){
let html="";
for(let i=0;i<questions.length;i++){
let color="#ccc";
if(status[i]=="answered") color="green";
else if(status[i]=="notAnswered") color="red";
else if(status[i]=="review") color="orange";

html+=`<button class="palette-btn" style="background:${color}" onclick="goTo(${i})">${i+1}</button>`;
}
palette.innerHTML=html;
}

function goTo(i){ index=i; loadQ(); }
function confirmSubmit(){ if(confirm("Submit exam?")) submitExam(); }

/* RESULT */
function submitExam(){
clearInterval(timerInterval);

exam.style.display="none";
result.style.display="block";

/* HEADER INFO */
let now=new Date();
studentInfo.innerText=`Name: ${window.studentName} | Date: ${now.toLocaleDateString()} | Time: ${now.toLocaleTimeString()}`;

let correct=0,wrong=0,unattempted=0;

questions.forEach((q,i)=>{
if(answers[i]===undefined) unattempted++;
else if(answers[i]===q.options[q.ans]) correct++;
else wrong++;
});

tTotal.innerText=questions.length;
tCorrect.innerText=correct;
tWrong.innerText=wrong;
tUnattempted.innerText=unattempted;
tScore.innerText=((correct/questions.length)*100).toFixed(1)+"%";

/* ✅ PERFECT CHARTS */
new Chart(pieChart,{
type:"pie",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

new Chart(barChart,{
type:"bar",
data:{labels:["Correct","Wrong","Unattempted"],datasets:[{data:[correct,wrong,unattempted]}]},
options:{responsive:true,maintainAspectRatio:false}
});

generateReview();
}

/* REVIEW */
function generateReview(){
let html="";
questions.forEach((q,i)=>{
let bg="unattempted-bg";
if(answers[i]===q.options[q.ans]) bg="correct-bg";
else if(answers[i]!==undefined) bg="wrong-bg";

html+=`<div class="review-box ${bg}">
<b>Q${i+1}: ${q.q}</b><br>`;
q.options.forEach(opt=>{
let style="";
if(opt===q.options[q.ans]) style="color:green;font-weight:bold;";
if(opt===answers[i] && opt!==q.options[q.ans]) style="color:red;";
html+=`<div style="${style}">${opt}</div>`;
});
html+="</div>";
});
review.innerHTML=html;
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;

const pdf = new jsPDF('p','mm','a4');
let y = 10;

/* HEADER */
let now = new Date();
pdf.setFontSize(12);
pdf.text(`Name: ${window.studentName}`,10,y);
y+=6;
pdf.text(`Date: ${now.toLocaleDateString()}`,10,y);
y+=6;
pdf.text(`Time: ${now.toLocaleTimeString()}`,10,y);
y+=10;

/* SUMMARY */
pdf.text(`Total: ${questions.length}`,10,y); y+=6;
pdf.text(`Correct: ${tCorrect.innerText}`,10,y); y+=6;
pdf.text(`Wrong: ${tWrong.innerText}`,10,y); y+=6;
pdf.text(`Not Attempted: ${tUnattempted.innerText}`,10,y); y+=6;
pdf.text(`Score: ${tScore.innerText}`,10,y); y+=10;

/* QUESTIONS */
questions.forEach((q,i)=>{
let text = `Q${i+1}: ${q.q}`;
let splitQ = pdf.splitTextToSize(text, 180);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitQ,10,y);
y += splitQ.length * 6;

/* OPTIONS */
q.options.forEach((opt,idx)=>{
let label = "";

if(idx === q.ans){
label = `✔ ${opt}`; // correct
}else if(opt === answers[i]){
label = `✘ ${opt}`; // wrong selected
}else{
label = `- ${opt}`;
}

let splitOpt = pdf.splitTextToSize(label, 170);

if(y > 270){ pdf.addPage(); y=10; }
pdf.text(splitOpt,15,y);
y += splitOpt.length * 5;
});

y+=4;
});

pdf.save("Full_Result.pdf");
}

</script>

</body>
</html>
